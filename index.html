      for(let i=0;i<5;i++){ const gx=x+3.2+i*2.4, gy=y+6;
        if(got[i]){ const b=0.5+0.5*Math.sin((anim+i*22)/12); g.globalAlpha=0.4+b*0.45; circle(gx,gy,2,CRYSTAL_COL[i]); g.globalAlpha=1;
          poly([[gx,gy-1.9],[gx+1.2,gy],[gx,gy+1.9],[gx-1.2,gy]],CRYSTAL_COL[i]); }
        else { circle(gx,gy,1.1,'#2e2838'); g.strokeStyle='#3e3850'; g.lineWidth=0.7; g.beginPath(); g.arc(gx,gy,1.4,0,6.283); g.stroke(); } } },

        {type:'say',name:'Cooling Altar',text:'The five Spring Crystals click into place and resonate as one...'},
        {type:'sfx',name:'spark'},{type:'flash',col:'#7fe0ff',ms:320},{type:'shake',ms:300},

      else { runSeq([
        {type:'say',name:'Cooling Altar',text:'Five Spring Crystals must rest here to quell the flames. '+n+' of 5 are set. The rest are scattered across Pallet Town - go and find them.'},
      ],()=>game.state='play'); }
    }}));
  // a small wooden TABLE with a hand-written NOTE, beside Flareon - the player must walk up and READ it
  placeEntity(newEntity({id:'note',kind:'obj',tx:8,ty:3,dir:'down',solid:true,visible:true,
    draw:(x,y)=>{ ellipse(x+8,y+15,6,2,C.shadow);
      rect(x+3,y+11,1.6,4,'#5a4028'); rect(x+11.4,y+11,1.6,4,'#5a4028');     // table legs
      rect(x+2,y+8.5,12,3,'#7a5a3a'); rect(x+2,y+8.5,12,1,'#9a7a4a');         // table top

      {type:'say',name:'',text:'A weathered NOTE rests on the table beside Flareon. Oen leans in to read it...'},
      {type:'say',name:'Old Note',text:'"This shrine wards the flame. Set the five SPRING CRYSTALS into the altar\'s slots to quell the fire. When raiders came, the crystals were scattered across Pallet Town for safekeeping."'},
      {type:'func',fn:()=>{ F.readNote=true; game.objective='Find the 5 Spring Crystals scattered in town, then present them at the warehouse altar.'; }},
    ],()=>game.state='play'); }}));
  if(!F.warehouseIntro){ F.warehouseIntro=true; F.flareonQuest=true;
    runSeq([
      {type:'say',name:'Evo Tracker',text:'Fire energy very close. This is the Ember Warehouse.'},
      {type:'say',name:'',text:'Flareon is trapped behind a roaring wall of flame. Before it stands a cold stone ALTAR with five empty crystal slots - and a small TABLE with a hand-written NOTE sits beside Flareon.'},
      {type:'objective',text:'Read the NOTE on the table beside Flareon.'},
    ],()=>{ game.state='play'; });
  } else if(!F.readNote){ game.objective='Read the NOTE on the table beside Flareon.'; }
  else { game.objective = crystalCount()>=5 ? 'Present the 5 Spring Crystals at the altar to free Flareon.' : 'Find the Spring Crystals in town ('+crystalCount()+'/5), then return to the altar.'; }
}

const evo={ t:0, cb:null };
function startEvo(cb){ F.partner='umbreon';
  audio.stopMusic();   // silence the lingering battle/boss theme so the evolution film plays clean & quiet
  // play the cinematic film FIRST, then run the canvas morph that clearly shows
  // Eevee changing INTO Umbreon (so the transformation itself is never missed); the heart theme
  // ('emotion') only kicks in once the in-game Eevee->Umbreon morph begins, in startEvoCanvas
  playStoryVideo('evolution', ()=>startEvoCanvas(cb), ()=>startEvoCanvas(cb)); }
function startEvoCanvas(cb){ evo.t=0; evo.cb=cb; game.state='evo'; audio.play('emotion');
  audio.note(130,0.6,'sine',0.4); audio.note(196,0.6,'triangle',0.25,0.15); clearPressed(); F.partner='umbreon'; }
function evoUpdate(dt){
  evo.t+=dt;
  if(evo.t>3400 && evo.t-dt<=3400) audio.sfx('heal');
  if(evo.t>7200 && evo.t-dt<=7200){ audio.sfx('win'); }
  if((evo.t>=10000) || (consume('ok')&&evo.t>6200)){ const cb=evo.cb; evo.cb=null; if(cb) cb(); }
}
function evoDraw(){
  const t=evo.t, glow=clamp(t/3400,0,1);
  const art=sceneImg('evo');
  // when the painting is present, anchor the focal creature over the painted Eevee and scale it up
  const cx = art? 160 : VW/2, cy = art? 120 : 120, R = art? 24 : 16;
  if(art){
    drawCover(art,1, Math.sin(anim/500)*2);
    // veil thins as moonlight swells, then ramps DARK through the evolution so the painted Eevee
    // recedes and the transforming creature becomes the sole focal point.
    let veil = 0.46 - glow*0.18;
    if(t>=3400) veil = 0.28 + clamp((t-3400)/4200,0,1)*0.52;
    g.fillStyle='rgba(8,10,26,'+veil+')'; g.fillRect(0,0,VW,VH);
    for(const wx of [40,VW/2,VW-46]){ const bright=glow*(0.5+0.5*Math.sin((t+wx*7)/110));
      g.globalAlpha=0.05+bright*0.3; poly([[wx-9,0],[wx+9,0],[cx+16,cy],[cx-16,cy]], t>6800?'#fff7cc':'#dfeaff'); g.globalAlpha=1; }
    // warm spotlight pool under the creature
    const sp=g.createRadialGradient(cx,cy,2,cx,cy,62); sp.addColorStop(0,'rgba(255,250,224,'+(0.16+glow*0.34)+')'); sp.addColorStop(1,'rgba(255,250,224,0)');
    g.fillStyle=sp; g.beginPath(); g.arc(cx,cy,62,0,7); g.fill();
  } else {
    const grd=g.createLinearGradient(0,0,0,VH); grd.addColorStop(0,'#0c0c16'); grd.addColorStop(1,'#181126');
    g.fillStyle=grd; g.fillRect(0,0,VW,VH);
    const wins=[[34,12],[VW/2-12,6],[VW-58,12]];
    for(const [wx,wy] of wins){
      rrect(wx,wy,24,32,2,'#10182e');
      g.globalAlpha=0.35+glow*0.65; rect(wx+3,wy+3,18,26,'#d4e6ff'); g.globalAlpha=1;
      rect(wx+11,wy+3,2,26,'#10182e'); rect(wx+3,wy+14,18,2,'#10182e');
      const bright=glow*(0.55+0.45*Math.sin((t+wx*7)/110));
      g.globalAlpha=0.08+bright*0.34; poly([[wx+4,wy+30],[wx+20,wy+30],[cx+12,cy],[cx-12,cy]], t>6800?'#fff7cc':'#dfeaff'); g.globalAlpha=1;
    }
  }
  const phase = t<3400?'pre' : t<7200?'flicker' : t<8900?'flash' : 'umbreon';
  if(phase==='pre'){
    // always show the Eevee sprite so it's unmistakably Eevee that begins to change
    ellipse(cx,cy+15,18,4,'rgba(255,255,255,'+(0.12+glow*0.22)+')');
    drawMon('eevee',cx,cy+Math.sin(t/200)*1.5,R);
    g.globalAlpha=glow*(art?0.4:0.45); circle(cx,cy,(art?32:21)+Math.sin(t/100)*3,'#fff7d0'); g.globalAlpha=1;
  } else if(phase==='flicker'){
    g.globalAlpha=0.72; circle(cx,cy,(art?36:27)+Math.sin(t/55)*5,'#fffbe0'); g.globalAlpha=1;
    drawMon(Math.floor(t/110)%2?'umbreon':'eevee',cx,cy,R);
    g.globalAlpha=clamp((t-3400)/3800,0,1)*0.6; circle(cx,cy,art?26:18,'#ffffff'); g.globalAlpha=1;
  } else if(phase==='flash'){
    const p=clamp((t-7200)/1700,0,1);
    for(let r=0;r<6;r++){ g.globalAlpha=(0.5-r*0.07)*(1-p*0.25); circle(cx,cy,8+p*150+r*16,'#ffffff'); } g.globalAlpha=1;
    g.globalAlpha=clamp(1-Math.abs(p-0.4)*2.4,0,1); g.fillStyle='#ffffff'; g.fillRect(0,0,VW,VH); g.globalAlpha=1;
  } else {
    ellipse(cx,cy+15,20,5,'rgba(244,209,30,.32)'); drawMon('umbreon',cx,cy,R);
    for(let i=0;i<8;i++){ const a=anim*0.05+i*0.78; circle(cx+Math.cos(a)*(art?36:27),cy+Math.sin(a)*(art?36:27),1.8,'#f4d11e'); }
  }
  g.textAlign='center';
  const cap = t<3400 ? 'A strange light pours in through the windows...' : t<7200 ? 'Eevee is evolving!' : t<8900 ? '' : 'Eevee evolved into UMBREON!';
  if(cap){ g.globalAlpha=0.82; rrect(12,VH-32,VW-24,22,6,'#0a0a14'); g.globalAlpha=1;

  g.textAlign='left';

/* =========================================================================
   CINEMATIC FINALE - the choosing scene (a "video"-style heartfelt sequence)
   ========================================================================= */
const CINEMA_MONS=[{sp:'jolteon',name:'Jolteon'},{sp:'flareon',name:'Flareon'},{sp:'sylveon',name:'Sylveon'}];
const cinema={ phase:'select', sel:2, t:0, declined:{}, declineWho:0, hearts:[], sparks:[] };
function startCinema(){ cinema.phase='select'; cinema.sel=0; cinema.t=0; cinema.declined={}; cinema.hearts=[]; cinema.sparks=[]; game.state='cinema'; game.fade=1; audio.play('emotion'); }
function cinemaHeart(){ cinema.hearts.push({x:128+(Math.random()*44-22),y:104,vx:(Math.random()-0.5)*1.3,vy:-(0.5+Math.random()*0.9),life:1700+Math.random()*700,t0:1700}); }
function cinemaUpdate(dt){
  cinema.t+=dt;
  if(game.fade>0) game.fade=Math.max(0, game.fade-dt/650);
  for(let i=cinema.hearts.length-1;i>=0;i--){ const h=cinema.hearts[i]; h.x+=h.vx; h.y+=h.vy; h.vy+=0.006; h.life-=dt; if(h.life<=0) cinema.hearts.splice(i,1); }
  for(let i=cinema.sparks.length-1;i>=0;i--){ const s=cinema.sparks[i]; s.x+=s.vx; s.y+=s.vy; s.life-=dt; if(s.life<=0) cinema.sparks.splice(i,1); }
  if(cinema.phase==='select'){
    if(consume('left')||consume('up')){ let n=cinema.sel; do{ n=(n+2)%3; }while(cinema.declined[n]&&n!==2); cinema.sel=n; audio.sfx('cursor'); }
    if(consume('right')||consume('down')){ let n=cinema.sel; do{ n=(n+1)%3; }while(cinema.declined[n]&&n!==2); cinema.sel=n; audio.sfx('cursor'); }
    if(consume('ok') && game.fade<0.3){
      if(cinema.sel===2){ audio.sfx('heal'); chooseSylveon(); }
      else { cinema.phase='decline'; cinema.declineWho=cinema.sel; cinema.t=0; audio.note(392,0.3,'sine',0.3); audio.note(294,0.4,'sine',0.3,0.18); }
    }
  } else if(cinema.phase==='decline'){
    if(cinema.t>3200 || (consume('ok')&&cinema.t>1600)){
      cinema.declined[cinema.declineWho]=true; cinema.sel=2; cinema.phase='select';
    }
  } else if(cinema.phase==='accept'){
    if(cinema.t>900 && anim%3===0) cinemaHeart();
    if(cinema.t>1400 && anim%2===0){ const a=Math.random()*6.28, rr=36+Math.random()*26; cinema.sparks.push({x:128+Math.cos(a)*rr,y:90+Math.sin(a)*rr,vx:Math.cos(a)*0.3,vy:Math.sin(a)*0.3-0.2,life:600,col:Math.random()<0.5?'#fff0a0':'#ffd0e6'}); }
    if(cinema.t>4800 || (consume('ok')&&cinema.t>1800)){ game.state='credits'; startCredits(()=>{}); }
  }
}

function cinemaDraw(){
  cinemaBackdrop();
  if(cinema.phase==='select'){
    g.textAlign='center'; textShadow('Who will you choose, Oen?',VW/2,20,'#fff','#3a1a4a',13); g.textAlign='left';
    const xs=[60,128,196], y=104;
    for(let i=0;i<3;i++){ const seld=i===cinema.sel, dim=!!cinema.declined[i];
      const R=(seld?30:20), yy=y+(seld?Math.sin(anim/18)*3:0);
      if(seld&&!dim){ for(let r=0;r<3;r++){ g.globalAlpha=0.16-r*0.045; circle(xs[i],yy,R+8+r*7+Math.sin(anim/12)*2,'#ffe0f0'); } g.globalAlpha=1; }
      ellipse(xs[i],yy+R*0.92,R*0.95,R*0.28,'rgba(255,255,255,.14)');
      g.globalAlpha=dim?0.35:1; drawMon(CINEMA_MONS[i].sp,xs[i],yy,R); g.globalAlpha=1;
      g.textAlign='center';
      if(seld) textShadow(CINEMA_MONS[i].name,xs[i],yy+R+6,dim?'#aaa':'#fff','#3a1a4a',10);
      if(dim) text('stays at the lab',xs[i],yy+R+6,'#c9b6c9',8);
      g.textAlign='left';
    }
    g.textAlign='center'; if(Math.floor(anim/52)%2) textShadow('◀  ▶   choose       SPACE  confirm',VW/2,VH-16,'#ffe0f0','#3a1a4a',9); g.textAlign='left';
  } else if(cinema.phase==='decline'){
    const i=cinema.declineWho, t=cinema.t, p=clamp(t/700,0,1);
    const cx=lerp([60,128,196][i],128,p), cy=lerp(104,92,p), R=lerp(20,32,p);
    let ox=0; if(t>1300) ox=Math.sin((t-1300)/110)*5*clamp(1-(t-1300)/1600,0,1);
    ellipse(cx,cy+R*0.92,R*0.95,R*0.28,'rgba(255,255,255,.14)');
    drawMon(CINEMA_MONS[i].sp,cx+ox,cy,R);
    const txt = i===0
      ? ['Jolteon crackles with energy... then gently shakes its head.','It wants to stay and guard the lab.  (choose again)']
      : ['Flareon nuzzles you warmly... then pads back to the lab.','It feels safest resting here now.  (choose again)'];
    cinemaTextBox(t>500?txt[0]:'', t>1900?txt[1]:'');
  } else if(cinema.phase==='accept'){
    const t=cinema.t, p=clamp(t/900,0,1);
    const cx=lerp(196,128,p), cy=lerp(104,90,p), R=lerp(20,42,clamp(t/1500,0,1));
    if(t>700){ const b=clamp((t-700)/700,0,1); for(let r=0;r<4;r++){ g.globalAlpha=(0.26-r*0.05)*b; circle(cx,cy,R+12+r*13+Math.sin(anim/10)*3,'#fff0f6'); } g.globalAlpha=1; }
    ellipse(cx,cy+R*0.9,R*0.9,R*0.28,'rgba(255,255,255,.2)');
    drawMon('sylveon',cx,cy+Math.sin(anim/16)*2,R);
    for(const s of cinema.sparks){ g.globalAlpha=clamp(s.life/600,0,1); drawStar(s.x,s.y,2.4,s.col); g.globalAlpha=1; }
    let l1='',l2='',hl=false;
    if(t>300) l1='Sylveon races straight into Oen\'s arms!';
    if(t>2000){ l1='Its ribbons curl around you, glowing with joy.'; l2='♥'; hl=true; }
    cinemaTextBox(l1,l2,hl);
    if(t>1800 && Math.floor(anim/52)%2){ g.textAlign='center'; text('SPACE',VW/2,VH-12,'#fff',8); g.textAlign='left'; }
  }
  for(const h of cinema.hearts){ drawHeart(h.x,h.y,3+Math.sin(anim/10)*0.6,clamp(h.life/700,0,1)); }
}

// ---- persistent Eevee progression (level grows across the adventure) ----
function eeveeMaxHp(lv){ return 60 + Math.round((lv-10)*9); }   // lv10:60  lv15:105  lv25:195
function eeveeLv(){ return F.eeveeLv || 10; }
function startBattle(cfg, onWin, onLose){
  battle.active=true; battle.cfg=cfg; battle.onWin=onWin; battle.onLose=onLose||null; battle.prevTrack=audio.track;
  battle.enemies=(cfg.enemies||[]).map(s=>{ const d=ENEMY[s.species]; const hp=(s.hp!=null)?s.hp:Math.round(d.hp*1.4*(s.hpMul||1));
    return {species:s.species,name:MON[s.species].name,lv:(s.lv||d.lv),hp:hp,max:hp,atk:Math.round(d.atk*(s.atkMul||1)),type:d.type,moves:(s.moves||d.moves).slice()}; });
  battle.ei=0;
  if(cfg.playerSpecies==='umbreon'){
    // Umbreon carries Eevee's earned level forward (post power-stone it's ~25)
    const ulv=Math.max(25, eeveeLv()); const umax=eeveeMaxHp(ulv);
    battle.player={species:'umbreon',name:'Umbreon',lv:ulv,hp:umax,max:umax,dmgMul:1.5,   // Umbreon hits 1.5x harder
      moves:UMBREON_MOVES.map(n=>({name:n,type:MOVES[n].type,pow:MOVES[n].pow,pp:MOVES[n].pp,maxpp:MOVES[n].pp,drain:MOVES[n].drain}))};
  } else {
    const elv=eeveeLv(); const emax=eeveeMaxHp(elv);
    battle.player={species:'eevee',name:'Eevee',lv:elv,hp:emax,max:emax,dmgMul:1,
      moves:EEVEE_MOVES.map(n=>({name:n,type:MOVES[n].type,pow:MOVES[n].pow,pp:MOVES[n].pp,maxpp:MOVES[n].pp,drain:MOVES[n].drain}))};
  }
  battle.bigBars=!!cfg.bigBars;   // final Mewtwo duel uses oversized HP bars
  battle.ephShow=battle.enemies[0]?battle.enemies[0].hp:0; battle.phpShow=battle.player.hp;
  battle.mainSel=0; battle.moveSel=0; battle.helped=false; battle.lowhpT=0;
  battle.eShown=false; battle.pShown=false; battle.eIntro=0; battle.pIntro=0;
  battle.eBlink=0; battle.pBlink=0; battle.eShake=0; battle.pShake=0; battle.eFaint=0; battle.pFaint=0;
  battle.ball=null; battle.burst=0; battle.hitFlash=0; battle.hitShake=0; battle.trainerShown=true; battle.trainerOut=false; battle.trainerX=0;
  battle.phase='fx'; battle.pt=0; battle.startFx=1; battle.drainGate=false; battle.afterDrain=null;
  battle.foeAtk=0; battle.scripted=!!cfg.scripted; battle.transformed=false; battle.transT=0; battle.taunted=false;
  battle.mewAtk=0; battle.bonded=false; battle.dugIn=false;
  battle.double=false;
  battle.floaters=[];
  game.state='battle';
  audio.sfx('battlestart'); audio.play(cfg.music||'battle');
  if(cfg.double) startDoubleBattle(cfg);
}
function throwBall(who, fromX, fromY, toX, toY, arc){
  battle.ball={fromX,fromY,toX,toY,arc,t:0,dur: who==='enemy'?460:520, who, spin:0, x:fromX, y:fromY};
  audio.sfx('throw');
}
function beginEnemySend(first){
  const e=curEnemy();
  battle.trainerOut=true;
  throwBall('enemy', battle.EX+30, battle.EY-8, battle.EX, battle.EY, 16);
  bMsg((battle.cfg.trainer||'Foe')+' sent out '+e.name+'!', ()=>{ first? beginPlayerSend() : showMenu(); }, 0);
}
function beginPlayerSend(){
  throwBall('player', 8, VH-34, battle.PX, battle.PY, 28);

}
function showMenu(){ battle.phase='mainmenu'; battle.mainSel=0; }
function showFight(){ battle.phase='fightmenu'; }
function useMaxPotion(){   // BAG -> Max Potion: full heal, costs the turn (enemy then attacks)
  if(!(F.maxPotions>0)){ bMsg('Oen has no items to use right now!', ()=>showMenu(), 0); return; }
  if(battle.player.hp>=battle.player.max){ bMsg(battle.player.name+'\'s HP is already full!', ()=>showMenu(), 0); return; }
  F.maxPotions--; audio.sfx('heal');
  battle.player.hp=battle.player.max; spawnHearts(battle.PX,battle.PY-12,8);
  bMsg('Oen used a MAX POTION! '+battle.player.name+' was fully healed.  ('+F.maxPotions+' left)', ()=> setTimeoutBattle(820, doEnemyTurn), 0);
}
function calcDmg(pow,lv){ const base=pow*0.18+lv*0.5; const crit=Math.random()<0.12; const r=0.85+Math.random()*0.3; return {dmg:Math.max(2,Math.round(base*(crit?1.5:1)*r)), crit}; }
function applyDamageToEnemy(dmg){ const e=curEnemy(); e.hp=Math.max(0,e.hp-dmg); battle.eBlink=420; battle.eShake=320; }
function applyDamageToPlayer(dmg){ battle.player.hp=Math.max(0,battle.player.hp-dmg); battle.pBlink=420; battle.pShake=320; }
// punchy impact feedback on a landed hit: flash, screen shake, expanding ring, spark burst
function battleImpact(x,y,crit){
  battle.hitFlash=crit?1:0.75; battle.hitX=x; battle.hitY=y; battle.hitCrit=!!crit; battle.hitShake=(crit?300:190)*shakeAmt();
  battle.burst=1; battle.burstX=x; battle.burstY=y;
  spawnSpark(x,y, crit?20:13, crit?'#ffffff':'#ffe070');
  for(let i=0;i<(crit?11:6);i++){ const a=Math.random()*6.28, sp=1.6+Math.random()*2.6;
    game.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:15+Math.random()*12,t:0,col:crit?'#fff':'#ffd24a'}); }
}
// floating damage numbers - frame-aged (no dt needed), drawn unshaken over the sprites
function addDmgFloat(x,y,dmg,crit,toPlayer){
  if(!battle.floaters) battle.floaters=[];
  battle.floaters.push({x:x+(Math.random()*8-4), y, a0:anim, dmg:Math.max(0,dmg|0), crit:!!crit, toPlayer:!!toPlayer});
}
function drawFloaters(){
  if(!battle.floaters || !battle.floaters.length) return;
  g.textAlign='center';
  for(let i=battle.floaters.length-1;i>=0;i--){ const f=battle.floaters[i]; const age=anim-f.a0;
    if(age>54){ battle.floaters.splice(i,1); continue; }
    const t=age/54, yo=-age*0.55, al=t<0.7?1:1-(t-0.7)/0.3;
    g.globalAlpha=clamp(al,0,1);
    const px=f.crit?13:10, col=f.toPlayer?'#ff8a7a':(f.crit?'#ffe14a':'#ffffff'), sh=f.toPlayer?'#5a1410':'#3a2a08';
    if(f.crit) textShadow('CRITICAL!', f.x, f.y+yo-px+1, '#fff7a0','#5a3a08',6);
    textShadow('-'+f.dmg, f.x, f.y+yo, col, sh, px);
  }
  g.globalAlpha=1; g.textAlign='left';
}
// translate a battle-screen click into the same selection+confirm the keyboard would make
function battlePointer(mx,my){
  const b=SKIP_BTN;   // TEMP DEV: skip button hit-test
  if(mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h){ skipBattle(); return; }
  const by=VH-50, p=battle.phase;
  if(p==='mainmenu'){
    if(mx<157) return;                                   // left "What will…" box, not a command
    const col=mx<195?0:1, row=my<by+21?0:1;
    battle.mainSel=clampInt(row*2+col,0,3); pressed['ok']=true; return;
  }
  if(p==='fightmenu'){
    if(mx>=183){ pressed['menu']=true; return; }          // right info box = back
    const moves = battle.double ? (battle.allies[0]&&battle.allies[0].moves) : battle.player.moves;
    const col=mx<86?0:1, row=my<by+21?0:1, idx=row*2+col;
    if(moves && idx<moves.length && moves[idx]){ battle.moveSel=idx; pressed['ok']=true; }
    return;
  }
  if(p==='targetsel'){
    let best=-1,bd=1e9; battle.foes.forEach((f,i)=>{ if(f.alive){ const d=Math.abs(f.x-mx)+Math.abs(f.y-my); if(d<bd){bd=d;best=i;} } });
    if(best>=0 && bd<60) battle.tgt=best; pressed['ok']=true; return;
  }
  if(p==='msg') pressed['ok']=true;                        // advance / fast-forward text
}
function waitDrain(cb){ battle.phase='drainwait'; battle.afterDrain=cb; }
function setTimeoutBattle(ms, cb){ battle.phase='pause'; battle.pauseT=ms; battle.pauseCb=cb; }  // dramatic beat

function playMoveFx(moveName, attacker, onHit, onDone){
  const cfg = MOVE_FX[moveName] || {dur:880,hitAt:0.45,kind:'lunge',sfx:'mTackle'};
  battle.phase='moveanim'; battle.fxMove=moveName; battle.fxKind=cfg.kind; battle.fxAtk=attacker;
  battle.fxT=0; battle.fxDur=cfg.dur*BATTLE_PACE; battle.fxHitAt=cfg.hitAt; battle.fxHit=false;
  battle.fxOnHit=onHit; battle.fxOnDone=onDone;
  battle.fxFromX=null; battle.fxFromY=null; battle.fxToX=null; battle.fxToY=null;  // single-battle uses PX/EX
  audio.sfx(cfg.sfx);
}

function doPlayerMove(){
  const mv=battle.player.moves[battle.moveSel];
  if(mv.pp<=0){ bMsg('There\'s no PP left for that move!', ()=>showFight(), 0); return; }
  mv.pp--;
  const e=curEnemy();
  let {dmg,crit}=calcDmg(mv.pow, battle.player.lv);
  const mult=typeMult(mv.type, e.type);          // type effectiveness on the player's attack
  dmg=Math.max(1, Math.round(dmg*mult*(battle.player.dmgMul||1)));
  const superEff=mult>1;
  const eff = mult>1.5 ? 'It\'s super effective!' : (mult===0 ? 'It doesn\'t affect '+e.name+'...' : (mult<1 ? 'It\'s not very effective...' : ''));
  const drained = mv.drain ? Math.max(1, Math.round(dmg*mv.drain)) : 0;
  bMsg(battle.player.name+' used '+mv.name+'!', ()=>{
    playMoveFx(mv.name, 'player',
      ()=>{ audio.sfx(crit||superEff?'hitSuper':'hit'); applyDamageToEnemy(dmg); battleImpact(battle.EX, battle.EY, crit||superEff); addDmgFloat(battle.EX, battle.EY-14, dmg, crit||superEff, false); },
      ()=>{ waitDrain(()=>{
        const after=()=>{ if(e.hp<=0) enemyFaint(); else setTimeoutBattle(880, doEnemyTurn); };
        const doDrain=()=>{ if(!drained){ after(); return; }
          audio.sfx('heal'); battle.player.hp=Math.min(battle.player.max, battle.player.hp+drained); spawnHearts(battle.PX,battle.PY-12,6);
          bMsg(battle.player.name+' drained '+drained+' HP from '+e.name+'!', ()=>waitDrain(after), 0); };
        const showEff=()=>{ if(eff) bMsg(eff, doDrain, 0); else setTimeoutBattle(drained?300:740, doDrain); };
        if(crit) bMsg('A critical hit!', showEff, 0); else setTimeoutBattle(eff?420:740, showEff);
      }); }
    );
  }, 1300);
}
function doEnemyTurn(){
  if(battle.cfg.sylveonHelp && !battle.helped && battle.player.hp < battle.player.max*0.4){
    battle.helped=true;
    bMsg('Sylveon believes in Oen!', ()=>{
      audio.sfx('heal');
      battle.player.hp=Math.min(battle.player.max, battle.player.hp+24);
      spawnHearts(battle.PX, battle.PY-12, 7);
      waitDrain(()=> bMsg('A warm pink light heals Eevee!', ()=> enemyAttack(), 0));
    }, 0);
    return;
  }
  // trainer taunt: the first time their lead Pokemon is hurt past halfway, they snap at Oen (flavour, no mechanics)
  const ce=curEnemy();
  if(battle.cfg.taunts && !battle.scripted && !battle.taunted && ce && ce.hp>0 && ce.hp < ce.max*0.5){
    battle.taunted=true;

function dblAct(atk, def, move, after){

function dblResolveRound(){

    ()=>dblAct(jolt, aliveFoe(), jolt.moves[(Math.random()*jolt.moves.length)|0], step),
    ()=>dblAct(battle.foes[0], focusAlly(), battle.foes[0].moves[(Math.random()*battle.foes[0].moves.length)|0], step),
    ()=>dblAct(battle.foes[1], focusAlly(), battle.foes[1].moves[(Math.random()*battle.foes[1].moves.length)|0], step),

  if(p==='pause'){ battle.pauseT-=dt; if(battle.pauseT<=0){ const cb=battle.pauseCb; battle.pauseCb=null; if(cb)cb(); } return; }
  if(p==='moveanim'){ return; }

    if(battle.msgReveal<battle.msg.length){ const b=battle.msgReveal|0; battle.msgReveal+=battle.msgFast?TEXT_FAST:textRevealStep();

function drainTo(cur,target,max){ const sp=Math.max(0.14,(max||40)*0.003); const d=target-cur; if(Math.abs(d)<sp) return target; return cur + Math.sign(d)*Math.min(Math.abs(d), sp); } // gradual, visible HP drain (gentle scale so big bars aren't glacial)
function battleAnim(dt){
  const e=curEnemy();
  if(e) battle.ephShow = drainTo(battle.ephShow, e.hp, e.max);
  battle.phpShow = drainTo(battle.phpShow, battle.player.hp, battle.player.max);
  battle.drainGate = (e? Math.abs(e.hp-battle.ephShow)>0.4:false) || Math.abs(battle.player.hp-battle.phpShow)>0.4;
  // move animation timer
  if(battle.phase==='moveanim'){ battle.fxT+=dt;
    if(!battle.fxHit && battle.fxT>=battle.fxDur*battle.fxHitAt){ battle.fxHit=true; if(battle.fxOnHit) battle.fxOnHit(); }
    if(battle.fxT>=battle.fxDur){ const cb=battle.fxOnDone; battle.fxOnDone=null; battle.fxOnHit=null; if(cb) cb(); }
  }
  if(battle.eBlink>0) battle.eBlink-=dt; if(battle.pBlink>0) battle.pBlink-=dt;
  if(battle.eShake>0) battle.eShake-=dt; if(battle.pShake>0) battle.pShake-=dt;
  if(battle.hitFlash>0) battle.hitFlash-=dt/300; if(battle.hitShake>0) battle.hitShake-=dt;
  if(battle.eShown && battle.eIntro<1) battle.eIntro=Math.min(1,battle.eIntro+dt/240);
  if(battle.pShown && battle.pIntro<1) battle.pIntro=Math.min(1,battle.pIntro+dt/240);
  if(battle.eFaint>0 && battle.eFaint<1) battle.eFaint=Math.min(1,battle.eFaint+dt/420);
  if(battle.pFaint>0 && battle.pFaint<1) battle.pFaint=Math.min(1,battle.pFaint+dt/420);
  if(battle.trainerOut && battle.trainerShown){ battle.trainerX+=dt*0.16; if(battle.trainerX>90) battle.trainerShown=false; }
  if(battle.ball){
    const b=battle.ball; b.t+=dt; const p=clamp(b.t/b.dur,0,1);
    b.x=lerp(b.fromX,b.toX,p); b.y=lerp(b.fromY,b.toY,p)-Math.sin(p*Math.PI)*b.arc; b.spin=p*26;
    if(p>=1){ battle.burst=1; battle.burstX=b.toX; battle.burstY=b.toY; audio.sfx('ballopen');
      if(b.who==='enemy'){ battle.eShown=true; battle.eIntro=0; } else { battle.pShown=true; battle.pIntro=0; }
      battle.ball=null; }
  }
  if(battle.burst>0) battle.burst-=dt/280;
  if(battle.player.hp>0 && battle.player.hp<=battle.player.max*0.2 && battle.pFaint===0){
    battle.lowhpT+=dt; if(battle.lowhpT>=640){ battle.lowhpT=0; audio.sfx('lowhp'); }

function battleUpdate(dt){
  if(battle.double){ dblAnim(dt); dblUpdate(dt); return; }
  battleAnim(dt);
  if(battle.phase==='transform'){
    battle.transT+=dt;
    if(!battle.transSwapped && battle.transT>=1500){ battle.transSwapped=true; battle.player.species='umbreon'; }
    if(battle.transT>=2700){ finishTransform(); }
    return;
  }
  if(battle.phase==='fx'){
    battle.pt+=dt; if(battle.startFx>0) battle.startFx-=dt/2000;   // 2-second battle-start blip (battle theme starts with it)
    if(battle.pt>=2000){ battle.startFx=0; bMsg('You are challenged by '+(battle.cfg.trainer||'a Trainer')+'!', ()=>beginEnemySend(true), 0); }
    return;
  }
  if(battle.phase==='drainwait'){ if(!battle.drainGate){ const cb=battle.afterDrain; battle.afterDrain=null; if(cb) cb(); } return; }
  if(battle.phase==='pause'){ battle.pauseT-=dt; if(battle.pauseT<=0){ const cb=battle.pauseCb; battle.pauseCb=null; if(cb) cb(); } return; }
  if(battle.phase==='moveanim'){ return; }   // timing handled in battleAnim
  if(battle.phase==='msg'){
    if(battle.msgReveal<battle.msg.length){ const b=battle.msgReveal|0; battle.msgReveal+=battle.msgFast?TEXT_FAST:textRevealStep();
      if((battle.msgReveal|0)>b && ((battle.msgReveal|0)%6===0)) audio.note(640,0.025,'square',0.06); }
    const done=battle.msgReveal>=battle.msg.length;
    if(battle.msgAuto>0){
      if(done){ battle.msgAutoT+=dt; if(battle.msgAutoT>=battle.msgAuto){ const cb=battle.msgCb; battle.msgCb=null; if(cb) cb(); } }
      if(consume('ok') && !done) battle.msgReveal=battle.msg.length;
    } else if(consume('ok')){
      if(!done) battle.msgReveal=battle.msg.length;
      else { audio.sfx('cursor'); const cb=battle.msgCb; battle.msgCb=null; if(cb) cb(); }
    }
    return;
  }
  if(battle.phase==='mainmenu'){
    if(consume('left')&&battle.mainSel%2===1){ battle.mainSel--; audio.sfx('cursor'); }
    else if(consume('right')&&battle.mainSel%2===0){ battle.mainSel++; audio.sfx('cursor'); }
    else if(consume('up')&&battle.mainSel>=2){ battle.mainSel-=2; audio.sfx('cursor'); }
    else if(consume('down')&&battle.mainSel<2){ battle.mainSel+=2; audio.sfx('cursor'); }
    if(consume('ok')){ audio.sfx('confirm');
      if(battle.mainSel===0) showFight();
      else if(battle.mainSel===1) useMaxPotion();
      else if(battle.mainSel===2) bMsg('Eevee is raring to go! There\'s no one else to switch in.', ()=>showMenu(), 0);
      else bMsg('No! There\'s no running from a Trainer battle!', ()=>showMenu(), 0);
    }
    return;
  }
  if(battle.phase==='fightmenu'){
    if(consume('left')&&battle.moveSel%2===1){ battle.moveSel--; audio.sfx('cursor'); }
    else if(consume('right')&&battle.moveSel%2===0){ battle.moveSel++; audio.sfx('cursor'); }
    else if(consume('up')&&battle.moveSel>=2){ battle.moveSel-=2; audio.sfx('cursor'); }
    else if(consume('down')&&battle.moveSel<2){ battle.moveSel+=2; audio.sfx('cursor'); }
    if(consume('menu')){ audio.sfx('cancel'); showMenu(); }
    else if(consume('ok')){ audio.sfx('confirm'); doPlayerMove(); }
    return;
  }
}
function drawBattleMon(sp, cx, cy, R, intro, blink, shake, faint, breathSeed){
  if(blink>0 && Math.floor(blink/55)%2===0) return;          // hit-blink flicker
  let sx=1, sy=1, alpha=1, dy=0;
  if(intro<1){ const e=intro<0?0:intro; const s=0.25+0.75*e; sx=s; sy=s; alpha=Math.min(1,e*1.5); }
  else { const br=Math.sin((anim+breathSeed)/24)*0.03; sx=1+br; sy=1-br; }  // breathing
  if(faint>0){ dy=faint*42; alpha=1-faint; sy*=Math.max(0.08,1-faint*0.75); }
  let ox=0; if(shake>0) ox=(Math.random()*2-1)*2.2;
  if(faint<0.5){ g.globalAlpha=0.22*(1-faint); ellipse(cx, cy+R*0.92, R*0.8, R*0.26, '#000'); g.globalAlpha=1; }

  g.restore(); g.globalAlpha=1;

/* ---- Card scanner: live camera, hold up the Poppy card, SPACE to scan -> always verifies ---- */
const cardScan = { el:null, stream:null, snap:null, phase:'live', t:0, err:false };
const CARD_W=92, CARD_H=128, CARD_X=(VW-92)/2, CARD_Y=(VH-128)/2-6;   // card-shaped guide box
function startCardScan(){
  if(!audio.started) audio.start();
  game.state='cardscan'; clearPressed();
  cardScan.phase='live'; cardScan.t=0; cardScan.err=false;
  if(!cardScan.el){ const v=document.createElement('video'); v.playsInline=true; v.setAttribute('playsinline',''); v.muted=true; cardScan.el=v; }
  if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
    navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' }, audio:false }).then(stream=>{
      if(game.state!=='cardscan' || cardScan.phase!=='live'){ stream.getTracks().forEach(t=>t.stop()); return; }   // bailed out, or already scanned, while the camera was warming up -> never turn it on
      cardScan.stream=stream; cardScan.el.srcObject=stream;
      const p=cardScan.el.play(); if(p&&p.catch) p.catch(()=>{});
    }).catch(()=>{ cardScan.err=true; });                  // denied / no camera -> still let SPACE "scan"
  } else { cardScan.err=true; }
}
function stopCardScan(){
  if(cardScan.stream){ try{ cardScan.stream.getTracks().forEach(t=>t.stop()); }catch(e){} cardScan.stream=null; }
  if(cardScan.el){ try{ cardScan.el.pause(); }catch(e){} cardScan.el.srcObject=null; }
}
function snapCard(){   // freeze the current frame (mirrored, like the live preview) into an offscreen canvas
  const v=cardScan.el, c=cardScan.snap || (cardScan.snap=document.createElement('canvas'));
  const iw=(v&&v.videoWidth)||VW, ih=(v&&v.videoHeight)||VH;
  c.width=iw; c.height=ih; const cx=c.getContext('2d');
  if(v && v.readyState>=2){ cx.save(); cx.translate(iw,0); cx.scale(-1,1); cx.drawImage(v,0,0,iw,ih); cx.restore(); }
  else { cx.fillStyle='#0a0812'; cx.fillRect(0,0,iw,ih); }
}
function cardScanUpdate(dt){
  cardScan.t+=dt;
  if(consume('menu')){ audio.sfx('cancel'); stopCardScan(); game.state='title'; return; }   // Esc -> back to title
  if(cardScan.phase==='live'){
    if(consume('ok')){
      if(!cardScan.stream && !cardScan.err){ audio.sfx('cancel'); }            // camera not on yet -> can't scan, nudge & wait
      else { snapCard(); stopCardScan(); cardScan.phase='scanning'; cardScan.t=0; audio.sfx('confirm'); }
    }
  } else if(cardScan.phase==='scanning'){
    if(cardScan.t>=1500){ cardScan.phase='processing'; cardScan.t=0; audio.sfx('confirm'); }
  } else if(cardScan.phase==='processing'){
    if(cardScan.t>=8000){ cardScan.phase='verified'; cardScan.t=0; audio.fanfare(); }   // 0-100% over 8 seconds
  } else if(cardScan.phase==='verified'){
    if(cardScan.t>=1400 || (consume('ok')&&cardScan.t>500)){ startCharIntro(); }   // -> Oen/Poppy intro page
  }
}
function cardBracket(x,y,w,h,len,col){   // corner-bracket frame around the guide box
  g.strokeStyle=col; g.lineWidth=2; g.beginPath();
  g.moveTo(x,y+len); g.lineTo(x,y); g.lineTo(x+len,y);
  g.moveTo(x+w-len,y); g.lineTo(x+w,y); g.lineTo(x+w,y+len);
  g.moveTo(x+w,y+h-len); g.lineTo(x+w,y+h); g.lineTo(x+w-len,y+h);
  g.moveTo(x+len,y+h); g.lineTo(x,y+h); g.lineTo(x,y+h-len);
  g.stroke();
}
function cardScanDraw(){
  g.fillStyle='#070610'; g.fillRect(0,0,VW,VH);
  // camera feed (live, mirrored) or the frozen snapshot once scanning
  if(cardScan.phase==='live'){
    const v=cardScan.el;
    if(v && v.readyState>=2){ g.save(); g.translate(VW,0); g.scale(-1,1); drawCover(v,1,0); g.restore(); }
    else { g.textAlign='center'; text(cardScan.err?'Camera unavailable':'Starting camera…', VW/2, VH/2, '#7a86b0', 9); g.textAlign='left'; }
  } else if(cardScan.snap){ drawCover(cardScan.snap,1,0); }
  // dim vignette so the UI text reads over the video
  g.fillStyle='rgba(8,6,18,.34)'; g.fillRect(0,0,VW,VH);
  g.fillStyle='#070610'; g.fillRect(0,0,VW,17); g.fillRect(0,VH-24,VW,24);   // slightly taller header/footer bars
  g.textAlign='center'; g.textBaseline='alphabetic';                          // fixed baseline so bottom hints never clip the frame edge
  textShadow('SCAN PLAYER ID', VW/2, 12, '#bfe0ff', '#0a1830', 9);

  if(cardScan.phase==='live'){
    const pulse=0.5+0.5*Math.sin(anim/12);
    cardBracket(CARD_X,CARD_Y,CARD_W,CARD_H,16, 'rgba(120,210,255,'+(0.45+pulse*0.5).toFixed(2)+')');
    const ready = cardScan.stream || cardScan.err;   // only invite a scan once the camera is actually on (or unavailable)
    if(Math.floor(anim/46)%2) textShadow(ready?'Hold up your card  ·  press SPACE to scan':'Starting camera…  one moment', VW/2, VH-11, ready?'#fff':'#bfe0ff', '#0a1830', 8);
  } else if(cardScan.phase==='scanning'){
    cardBracket(CARD_X,CARD_Y,CARD_W,CARD_H,16, 'rgba(120,210,255,.85)');
    const prog=Math.min(1,cardScan.t/1500), sy=CARD_Y+CARD_H*prog;
    const grd=g.createLinearGradient(0,sy-12,0,sy+12); grd.addColorStop(0,'rgba(120,230,255,0)');
    grd.addColorStop(0.5,'rgba(150,240,255,.55)'); grd.addColorStop(1,'rgba(120,230,255,0)');
    g.fillStyle=grd; g.fillRect(CARD_X,sy-12,CARD_W,24);
    g.strokeStyle='rgba(190,250,255,.95)'; g.lineWidth=1.5; g.beginPath(); g.moveTo(CARD_X,sy); g.lineTo(CARD_X+CARD_W,sy); g.stroke();
    const n=Math.floor(cardScan.t/300)%4; let d=''; for(let i=0;i<n;i++) d+='.';
    textShadow('SCANNING'+d, VW/2, VH-11, '#bfe0ff', '#0a1830', 9);
  } else if(cardScan.phase==='processing'){
    cardBracket(CARD_X,CARD_Y,CARD_W,CARD_H,16, 'rgba(120,210,255,.7)');
    const pct=Math.min(100, Math.floor(cardScan.t/80));   // 8000ms -> 100%
    const bx=CARD_X+5, bw=CARD_W-10, by=CARD_Y+CARD_H-14;
    rrect(bx-2,by-2,bw+4,9,2,'rgba(8,16,30,.85)');
    const grd=g.createLinearGradient(bx,0,bx+bw,0); grd.addColorStop(0,'#3aa0e0'); grd.addColorStop(1,'#7df0ff');
    g.fillStyle=grd; rpath(bx,by,Math.max(0,bw*pct/100),5,2); g.fill();
    if(pct<100 && Math.floor(anim/8)%3===0){ g.fillStyle='rgba(255,255,255,.5)'; g.fillRect(bx+bw*pct/100-2,by,2,5); }   // leading sparkle
    textShadow('PROCESSING  '+pct+'%', VW/2, by-6, '#cfeaff', '#0a1830', 9);
    textShadow('Verifying player ID…', VW/2, VH-11, '#9fc4e8', '#0a1830', 8);
  } else { // verified
    const a=Math.min(1,cardScan.t/180);
    g.fillStyle='rgba(40,200,120,'+(0.22*a).toFixed(2)+')'; g.fillRect(0,0,VW,VH);
    cardBracket(CARD_X,CARD_Y,CARD_W,CARD_H,16, 'rgba(90,240,150,.95)');
    g.strokeStyle='#7dffb0'; g.lineWidth=3; g.lineCap='round'; g.beginPath();   // check mark
    g.moveTo(VW/2-13,VH/2-2); g.lineTo(VW/2-3,VH/2+9); g.lineTo(VW/2+15,VH/2-13); g.stroke(); g.lineCap='butt';
    textShadow('VERIFIED', VW/2, VH/2+30, '#9affc0', '#06301a', 12);
    textShadow('Poppy card accepted ♥', VW/2, VH-11, '#f6a8c8', '#3a1028', 8);
  }
  g.textAlign='left';
  for(const h of game.hearts){ drawHeart(h.x,h.y,3,clamp(1-h.t/h.life,0,1)); }
}

function startCredits(cb){ credits.active=true; credits.t=0; credits.cb=cb; credits.phase='blank'; credits.phaseT=0; game.state='credits'; audio.play('emotion'); }
function markGameComplete(){ try{ localStorage.setItem('poke3lights_done','1'); }catch(e){} }
function creditsUpdate(dt){
  if(credits.phase==='blank'){                      // 5s of nothing before the text begins
    credits.phaseT+=dt;
    if(credits.phaseT>=5000 || consume('ok')){ credits.phase='scroll'; credits.t=0; credits.phaseT=0; }
    return;
  }
  if(credits.phase==='scroll'){
    credits.t+=dt*0.0018;
    if((anim%40)===0) spawnHearts(Math.random()*VW, VH+6, 1);
    // scroll until the LAST line has travelled all the way up past the top of the screen
    const lastY=(VH+10) - credits.t*14 + (CREDIT_LINES.length-1)*18;
    if(lastY < -14 || (consume('ok')&&credits.t>0.4)){ credits.phase='hold'; credits.phaseT=0; }
    return;
  }
  credits.phaseT+=dt;
  if(credits.phase==='hold'){                        // text gone; wait 5s on a quiet dark screen
    if(credits.phaseT>=5000 || consume('ok')){ credits.phase='photofade'; credits.phaseT=0; }
    return;
  }
  if(credits.phase==='photofade'){                   // the picture fades in slowly
    if(credits.phaseT>=3000){ credits.phase='photo'; credits.phaseT=0; }
    return;
  }
  if(credits.phase==='photo'){
    if((anim%34)===0) spawnHearts(Math.random()*VW, VH+6, 1);
    if(consume('ok')&&credits.phaseT>400){ audio.sfx('confirm'); markGameComplete(); credits.phase='card1'; credits.phaseT=0; }
    return;
  }
  if(credits.phase==='card1'){ if(credits.phaseT>=7500){ audio.sfx('confirm'); credits.phase='card2'; credits.phaseT=0; } return; }
  if(credits.phase==='card2'){ if(credits.phaseT>=4000){ audio.fanfare(); credits.phase='thanks'; credits.phaseT=0; } return; }
  if(credits.phase==='thanks'){ if(consume('ok')&&credits.phaseT>700){ credits.active=false; markGameComplete(); resetToTitle(); } return; }
}

    }
  } else {
    // card-dispenser black screens
    g.fillStyle='#000'; g.fillRect(0,0,VW,VH);
    g.textBaseline='middle';
    if(credits.phase==='card1'){
      textShadow('Dispensing your card,', VW/2, VH/2-8, '#f6e8b0', '#000', 11);

  for(const k in F) delete F[k];

  saveSystem.delete();   // wipe the old save so Continue can't jump back to the previous run

  playStoryVideo('intro', startText, startText);

   SAVE / LOAD
   ========================================================================= */
const saveSystem = {
  save(){ // pack all game state into JSON
    const state={F,mapName:game.mapName,px:game.player?.px||0,py:game.player?.py||0,dir:game.player?.dir||'down',
      playerHp:game.player?.hp||0,playerMoves:game.player?.moves?.map(m=>({...m}))||[]};
    localStorage.setItem('poke3lights_save', JSON.stringify(state));
    return 'Game saved!';
  },
  load(){ // restore from JSON
    const s=localStorage.getItem('poke3lights_save'); if(!s) return null;
    try{ return JSON.parse(s); } catch(e){ return null; }
  },
  hasSave(){ return !!localStorage.getItem('poke3lights_save'); },
  delete(){ localStorage.removeItem('poke3lights_save'); }
};
function restoreGame(state){
  Object.assign(F, state.F);
  enterMap(state.mapName, state.px/16, state.py/16, state.dir);
  if(game.player){ game.player.hp=state.playerHp; game.player.moves=state.playerMoves; }
  game.state='play';
}

function pauseUpdate(){
  if(consume('menu')){ game.paused=false; clearPressed(); return; }
  if(consume('up') && pause.sel>0){ pause.sel--; pause.confirmQuit=false; audio.sfx('cursor'); }
  else if(consume('down') && pause.sel<PAUSE_ITEMS-1){ pause.sel++; pause.confirmQuit=false; audio.sfx('cursor'); }
  else { const left=consume('left'), right=consume('right');
    if(left||right){
      if(pause.sel===2){ settings.textSpeed=clampInt(settings.textSpeed+(right?1:-1),0,2); saveSettings(); audio.sfx('cursor'); }
      else if(pause.sel===3){ settings.shake=!settings.shake; saveSettings(); audio.sfx('cursor'); }
      else if(pause.sel===4){ setVolume(settings.volume+(right?1:-1)); audio.sfx('cursor'); }
    }
  }
  if(consume('ok')){
    audio.sfx('confirm');
    if(pause.sel===0){ game.paused=false; clearPressed(); }
    else if(pause.sel===1){ pause.msg=saveSystem.save(); pause.msgT=100; }
    else if(pause.sel===2){ settings.textSpeed=(settings.textSpeed+1)%3; saveSettings(); pause.msg='Text speed: '+TEXT_SPEED_LABEL[settings.textSpeed]; pause.msgT=80; }
    else if(pause.sel===3){ settings.shake=!settings.shake; saveSettings(); pause.msg='Screen shake: '+(settings.shake?'On':'Off'); pause.msgT=80; }
    else if(pause.sel===4){ setVolume((settings.volume+1)%4); pause.msg='Volume: '+VOL_LABEL[settings.volume]; pause.msgT=70; }
    else if(pause.sel===5){
      if(pause.confirmQuit){ pause.confirmQuit=false; game.paused=false; resetToTitle(); }
      else { pause.confirmQuit=true; pause.msg='Quit to title? Pick Title again to confirm.'; pause.msgT=200; }
    }
  }
}

/* =========================================================================
   BOOT / LOADING SPLASH - covers first-load asset pop-in, fades into the title
   ========================================================================= */
const boot = { active:true, t:0, fade:0, min:1100, fontsReady:true };
if(typeof document!=='undefined' && document.fonts && document.fonts.ready){
  boot.fontsReady=false; document.fonts.ready.then(()=>{ boot.fontsReady=true; }).catch(()=>{ boot.fontsReady=true; });
}
function bootProgress(){ const keys=Object.keys(ASSETS.scene); if(!keys.length) return 1;
  let n=0; for(const k of keys){ if(ASSETS._img['scene:'+k]) n++; } return n/keys.length; }
function bootUpdate(dt){
  boot.t+=dt;
  const titleReady = !!ASSETS._img['scene:town'] || boot.t>4000;   // wait for the title backdrop (capped)
  if(boot.t>boot.min && boot.fontsReady && titleReady){ boot.fade+=dt/450; if(boot.fade>=1) boot.active=false; }
}
function bootDraw(){
  const a=clamp(1-boot.fade,0,1); if(a<=0) return;
  g.globalAlpha=a;
  const grd=g.createLinearGradient(0,0,0,VH); grd.addColorStop(0,'#14101f'); grd.addColorStop(1,'#241a3a');
  g.fillStyle=grd; g.fillRect(0,0,VW,VH);
  for(let i=0;i<26;i++){ const sx=(i*53)%VW, sy=(i*37)%(VH-30); if((Math.floor(anim/24)+i)%4) rect(sx,sy,1,1,'rgba(170,160,220,.55)'); }
  g.textAlign='center';
  textShadow('POKéMON', VW/2, VH/2-20, '#f6d62e','#7a4a08', 16);
  textShadow('The Three Stolen Lights', VW/2, VH/2-2, '#e8e0ff','#2a1a44', 9);
  const bw=120, bx=(VW-bw)/2, byy=VH/2+16;
  rrect(bx,byy,bw,6,3,'rgba(255,255,255,.16)');
  const p=clamp(Math.max(boot.t/boot.min, bootProgress()),0,1);
  if(p>0) rrect(bx,byy,Math.max(6,bw*p),6,3,'#9fd0f0');
  if(Math.floor(anim/42)%2) text('Loading…', VW/2, byy+17, '#bfb8e0', 8);
  g.textAlign='left'; g.globalAlpha=1;
}

/* =========================================================================
   MAIN LOOP
   ========================================================================= */
let last=performance.now();
function loop(now){
  let dt=now-last; last=now; if(dt>60) dt=60;
  animAcc += dt; while(animAcc>=16.667){ anim++; animAcc-=16.667; }   // fixed 60fps animation clock (so 120/144Hz screens don't run everything double-speed)
  if(game.shake>0) game.shake-=dt;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
function update(dt){
  updateParticles();
  // global entity animation
  for(const e of game.entities) updateEntity(e,dt);

  if(boot.active){ bootUpdate(dt); if(boot.fade<=0){ clearPressed(); } }  // swallow input until the splash starts fading

  if(game.paused){ pauseUpdate(); return; }

  // cinematic establishing shot holds gameplay/cutscene briefly (skippable with SPACE)
  if(estActive()){ game.estT+=dt; if(game.estT>600 && consume('ok')) game.estT=game.estDur;
    if(game.state==='play'||game.state==='cutscene'){ if(game.player) updateCamera(); return; } }

  switch(game.state){
    case 'title':
      if(saveSystem.hasSave() || titleComplete()){
        if(consume('up')||consume('down')||consume('left')||consume('right')){ game.titleSel=game.titleSel?0:1; audio.sfx('cursor'); }
        if(consume('ok')){ audio.sfx('confirm');
          if(game.titleSel===1){ const s=saveSystem.load(); if(s){ restoreGame(s); break; } }
          startCardScan();
        }
      } else if(consume('ok')){ audio.sfx('confirm'); startCardScan(); }
      break;
    case 'cardscan': cardScanUpdate(dt); break;
    case 'charintro': charIntroUpdate(dt); break;
    case 'intro': introUpdate(dt); break;
    case 'play': playUpdate(dt); break;
    case 'cutscene':
      dlgUpdate();
      if(activeSeq){ activeSeq.update(dt); if(activeSeq.done && game.state==='cutscene' && !dlg.active){ /* seq sets state */ } }
      break;
    case 'battle': battleUpdate(dt); break;
    case 'catch': catchUpdate(dt); break;
    case 'vsintro': vsUpdate(dt); break;
    case 'video': videoUpdate(dt); break;
    case 'evo': evoUpdate(dt); break;
    case 'levelup': lvUpUpdate(dt); break;
    case 'cinema': cinemaUpdate(dt); break;
    case 'credits': creditsUpdate(dt); break;
  }
  if(game.player && (game.state==='play'||game.state==='cutscene')) updateCamera();
}
function render(){
  g.setTransform(RES,0,0,RES,0,0);   // HD super-sample: draw in logical coords, scaled up
  g.fillStyle='#000'; g.fillRect(0,0,VW,VH);
  switch(game.state){
    case 'title': titleDraw(); break;
    case 'cardscan': cardScanDraw(); break;
    case 'charintro': charIntroDraw(); break;
    case 'intro': introDraw(); break;
    case 'play': drawWorld(); drawInteractPrompt(); drawObjectiveHUD(); break;
    case 'cutscene': drawWorld(); dlgDraw(); break;
    case 'battle': battleDraw(); break;
    case 'catch': catchDraw(); break;
    case 'vsintro': vsDraw(); break;
    case 'video': videoDraw(); break;
    case 'evo': evoDraw(); break;
    case 'levelup': lvUpDraw(); break;
    case 'cinema': cinemaDraw(); break;
    case 'credits': creditsDraw(); break;
  }
  if(estActive() && (game.state==='play'||game.state==='cutscene')) estDraw();   // never overlay full-screen states (level-up, battle…) or its text doubles up
  if(game.paused) pauseDraw();
  // travel text overlay
  if(game.travelText){ g.fillStyle='rgba(0,0,0,.85)'; g.fillRect(0,0,VW,VH); g.textAlign='center'; textShadow(game.travelText,VW/2,VH/2-4,'#f6d62e','#000',9);
    drawMon('eevee',VW/2,VH/2+24,8); g.textAlign='left'; }
  // flash
  if(game.flash>0){ g.globalAlpha=game.flash*0.8; g.fillStyle=game.flashCol; g.fillRect(0,0,VW,VH); g.globalAlpha=1; }
  // fade
  if(game.fade>0){ g.globalAlpha=game.fade; g.fillStyle='#000'; g.fillRect(0,0,VW,VH); g.globalAlpha=1; }
  // mute indicator
  if(audio.muted){ text('[mute]',VW-32,VH-11,'#888',8); }
  // autosave toast (top-right, fades)
  if(game.savedT>0){ game.savedT--; const a=Math.min(1,game.savedT/30); g.globalAlpha=a;
    const tbw=58, tbx=VW-6-tbw, tby=44;
    rrect(tbx,tby,tbw,14,3,'rgba(20,28,44,.82)');
    g.textAlign='center'; text('✓ Saved',tbx+tbw/2,tby+10,'#bfe6c8',8); g.textAlign='left';   // centred so it never spills outside the box, whatever the prior textAlign was
    g.globalAlpha=1; }   // right side, below the objective bar & clear of the bottom dialogue
  // first-load splash on top of everything, crossfading into the title
  if(boot.active) bootDraw();
}

audio.track='warm';
requestAnimationFrame(loop);
</script>
