<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Pokémon: The Three Stolen Lights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;height:100%;background:#0b0b12;overflow:hidden;
    font-family:"Fredoka","Trebuchet MS","Segoe UI",system-ui,sans-serif;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{image-rendering:auto;
    box-shadow:0 0 0 4px #1a1a2e,0 0 40px rgba(0,0,0,.7);background:#000;}
  #hint{position:fixed;bottom:6px;left:0;right:0;text-align:center;color:#5a5a78;
    font-size:11px;letter-spacing:1px;pointer-events:none;}
  /* on-screen touch controls (mobile only; toggled on by JS) */
  #touch{position:fixed;inset:0;display:none;z-index:50;pointer-events:none;touch-action:none;
    -webkit-user-select:none;user-select:none;font-family:"Fredoka","Trebuchet MS","Segoe UI",system-ui,sans-serif;}
  #touch .btn{position:absolute;pointer-events:auto;display:flex;align-items:center;justify-content:center;
    color:#eef0fb;background:rgba(28,30,52,.42);border:2px solid rgba(180,190,230,.45);border-radius:12px;
    font-weight:bold;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(2px);}
  #touch .btn.on{background:rgba(96,124,206,.62);border-color:rgba(220,228,255,.8);}
  #touch .dpad{position:absolute;left:20px;bottom:26px;width:156px;height:156px;}
  #touch .dpad .btn{width:50px;height:50px;font-size:22px;}
  #tc-up{left:53px;top:0;} #tc-down{left:53px;top:106px;} #tc-left{left:0;top:53px;} #tc-right{left:106px;top:53px;}
  #tc-a{right:26px;bottom:48px;width:78px;height:78px;border-radius:50%;font-size:28px;
    background:rgba(208,82,72,.5);border-color:rgba(255,184,174,.6);}
  #tc-menu{right:30px;bottom:150px;width:66px;height:40px;font-size:14px;border-radius:10px;}
</style>
</head>
<body>
<div id="wrap"><canvas id="screen" width="256" height="192"></canvas></div>
<div id="hint">WASD / Arrows = move &nbsp;·&nbsp; Shift = run &nbsp;·&nbsp; Space / Enter = action &nbsp;·&nbsp; Esc = menu &nbsp;·&nbsp; M = mute &nbsp;·&nbsp; H = hide goal</div>
<div id="touch">
  <div class="dpad">
    <div class="btn" id="tc-up">▲</div>
    <div class="btn" id="tc-left">◀</div>
    <div class="btn" id="tc-right">▶</div>
    <div class="btn" id="tc-down">▼</div>
  </div>
  <div class="btn" id="tc-a">A</div>
  <div class="btn" id="tc-menu">MENU</div>
</div>
<script>
"use strict";
/* =========================================================================
   POKéMON: THE THREE STOLEN LIGHTS
   A short RPG made for Oen.  Single-file, original art drawn in code.
   ========================================================================= */

// ---------- canvas ----------
const VW = 256, VH = 192, TS = 16;   // logical layout space
let RES = 8;                         // device super-sampling factor (set per display in fitScreen)
const MAX_BACKING = 6400;            // cap backing-store width (headroom for 4K/5K displays)
const TEXT_SLOW = 0.4;               // reveal speed (~24 chars/sec at Normal); SPACE completes the line instantly
const BATTLE_PACE = 1.45;            // global battle slow-down (effects + beats)
const TEXT_FAST = 0.5;               // ~30 chars/sec while Space is held/pressed
// player-facing accessibility/feel settings (persisted in localStorage)
const TEXT_SPEED_MUL = [0.6, 1, 2.0];          // Slow / Normal / Fast multipliers on TEXT_SLOW
const TEXT_SPEED_LABEL = ['Slow','Normal','Fast'];
const VOL_MUL = [0, 0.35, 0.65, 1.0];          // Off / Low / Med / High
const VOL_LABEL = ['Off','Low','Med','High'];
const settings = { textSpeed:1, shake:true, volume:3, objMin:false };  // textSpeed/volume = index into the arrays above
try{ const s=JSON.parse(localStorage.getItem('poke3lights_settings')||'{}');
  if(typeof s.textSpeed==='number') settings.textSpeed=clampInt(s.textSpeed,0,2);
  if(typeof s.shake==='boolean') settings.shake=s.shake;
  if(typeof s.objMin==='boolean') settings.objMin=s.objMin;
  if(typeof s.volume==='number') settings.volume=clampInt(s.volume,0,3); }catch(e){}
function clampInt(v,a,b){ v=v|0; return v<a?a:v>b?b:v; }
function saveSettings(){ try{ localStorage.setItem('poke3lights_settings', JSON.stringify(settings)); }catch(e){} }
function applyVolume(){ const m=VOL_MUL[settings.volume];
  if(typeof audio!=='undefined'){
    if(audio.master) audio.master.gain.value = 0.9*m;
    if(audio.musicEl) audio.musicEl.volume = 0.6*m;
    audio.muted = (settings.volume===0);
  } }
function setVolume(v){ settings.volume=clampInt(v,0,3); saveSettings(); applyVolume(); }
function textRevealStep(){ return TEXT_SLOW*TEXT_SPEED_MUL[settings.textSpeed]; }
function shakeAmt(){ return settings.shake?1:0; }
const cv = document.getElementById('screen');
const g = cv.getContext('2d', { alpha:false });
function fitScreen(){
  const dpr = Math.min(window.devicePixelRatio||1, 3);
  const iw = window.innerWidth>1?window.innerWidth:1280, ih = window.innerHeight>1?window.innerHeight:800;   // fallback if viewport reports 0/1
  const s = Math.min(iw/VW, (ih-16)/VH);
  const cssW = Math.max(VW, Math.floor(VW*s)), cssH = Math.max(VH, Math.floor(VH*s));
  cv.style.width = cssW+'px'; cv.style.height = cssH+'px';
  // render the backing store at the display's true pixel density, plus a supersample pass
  // on low-DPI screens for extra-smooth edges (1:1 already crisp on retina/4K).
  const SS = dpr>=2 ? 1.0 : 1.6;
  RES = Math.max(6, Math.min((cssW*dpr*SS)/VW, MAX_BACKING/VW));
  cv.width = Math.round(VW*RES); cv.height = Math.round(VH*RES);
  g.imageSmoothingEnabled = true; g.imageSmoothingQuality = 'high';  // resets on canvas resize
}
window.addEventListener('resize', fitScreen); fitScreen();

/* =========================================================================
   CUSTOM ASSETS  (optional - for your own private build)
   ---------------------------------------------------------------------------
   Put your own files in the ./assets/ folder and set the path below.
   Leave a value as '' to use the built-in original music / art.
   Examples:
     mon.sylveon  = 'assets/sylveon.png'     (a PNG of the Pokémon)
     char.oen     = 'assets/oen.png'         (a small overworld sprite)
     music.battle = 'assets/battle.mp3'      (.mp3 / .ogg / .wav, loops)
     sfx.hit      = 'assets/hit.wav'
   Anything left blank keeps the original engine sound/art, so the game
   always runs even with no files added.  See assets/README.txt.
   ========================================================================= */
const ASSETS = {
  music: { lab:'assets/lab.m4a', route:'assets/route.m4a', tense:'assets/tense.m4a',
           battle:'assets/battle.m4a', boss:'assets/boss.m4a', warm:'assets/warm.m4a', emotion:'assets/emotion.m4a' },
  sfx:   { hit:'', hitSuper:'', hitWeak:'', faint:'', heal:'', win:'', confirm:'', cursor:'',
           ballopen:'', throw:'', battlestart:'', lowhp:'', door:'', spark:'',
           mTackle:'', mQuick:'', mBite:'', mSwift:'', mFire:'', mZap:'' },
  mon:   { eevee:'assets/eevee.png', umbreon:'assets/umbreon.png',
           jolteon:'assets/jolteon_mon.png', flareon:'assets/flareon_mon.png', sylveon:'assets/sylveon_mon.png',
           charizard:'assets/charizard.png', rayquaza:'assets/rayquaza.png', mewtwo:'assets/mewtwo.png',
           rattata:'assets/rattata_mon.png', zubat:'assets/zubat_mon.png', magnemite:'assets/magnemite_mon.png',
           voltorb:'assets/voltorb_mon.png', koffing:'assets/koffing_mon.png', houndour:'assets/houndour_mon.png',
           murkrow:'assets/murkrow_mon.png', persian:'assets/persian_mon.png' },
  char:  { oen:'', oak:'', asst:'', kid:'', grunt:'', rook:'' },
  // full-screen painted backdrops (4K AI art, downscaled): title, establishing shots,
  // battle arenas, evolution cinematic, and illustrated intro story panels.
  scene: { town:'assets/town.png', evo:'assets/evo.png', poppy:'assets/poppy.png', poppySylveon:'assets/poppy_sylveon.png', poppySylveonCut:'assets/poppy_sylveon_cut.png',
           lab:'assets/lab.png', station:'assets/station.png', warehouse:'assets/warehouse.png',
           garden:'assets/garden.png', hideout:'assets/hideout.png',
           bg_field:'assets/bg_field.png', bg_boss:'assets/bg_boss.png',
           bg_station:'assets/bg_station.png', bg_warehouse:'assets/bg_warehouse.png',
           intro1:'assets/intro1.png', intro2:'assets/intro2.png', intro3:'assets/intro3.png', intro4:'assets/intro4.png' },
  // full-screen story cinematics (mp4). Missing files fall back to the canvas cinematic.
  video: { intro:'assets/intro.mp4', evolution:'assets/evolution.mp4', ending:'assets/ending.mp4',
           jolteon:'assets/jolteon.mp4', flareon:'assets/flareon.mp4', sylveon:'assets/sylveon.mp4',
           theft:'assets/theft.mp4', title:'assets/title.mp4' },
  // looping AMBIENT videos played on area entry (the establishing shot animates). Missing -> still image.
  // (town deliberately omitted: title.mp4 has the game title baked in, which doubled up the "PALLET TOWN" card)
  areaVid: { lab:'assets/area_lab.mp4', station:'assets/area_station.mp4',
             warehouse:'assets/area_warehouse.mp4', garden:'assets/area_garden.mp4', hideout:'assets/area_hideout.mp4' },
  _img:{},
};
const ASSET_VER='20260621e';   // bump whenever an asset file is replaced, so browsers refetch instead of serving a stale cached copy
function loadImg(key,src){ const im=new Image(); im.onload=()=>{ASSETS._img[key]=im;}; im.onerror=()=>{}; im.src=src+(src.indexOf('?')<0?'?v='+ASSET_VER:''); }
function loadAssetImages(){
  for(const sp in ASSETS.mon){ if(ASSETS.mon[sp]) loadImg('mon:'+sp, ASSETS.mon[sp]); }
  for(const k in ASSETS.char){ if(ASSETS.char[k]) loadImg('char:'+k, ASSETS.char[k]); }
  for(const k in ASSETS.scene){ if(ASSETS.scene[k]) loadImg('scene:'+k, ASSETS.scene[k]); }
}
function sceneImg(name){ return ASSETS._img['scene:'+name]; }
// cinematic full-screen establishing shot - plays a looping ambient VIDEO for the area if one
// exists (ASSETS.areaVid), otherwise the painted still. Held longer when a video is present.
let estVid=null;
function showEstablishing(scene,name){ game.estScene=scene; game.estName=name; game.estT=0; clearPressed();
  const vsrc=ASSETS.areaVid&&ASSETS.areaVid[scene];
  if(vsrc){ game.estDur=5200;            // give the clip room to play
    if(!estVid){ estVid=document.createElement('video'); estVid.muted=true; estVid.loop=true; estVid.playsInline=true; estVid.setAttribute('playsinline',''); }
    estVid._err=false; estVid.onerror=()=>{ estVid._err=true; };
    try{ estVid.src=vsrc; estVid.currentTime=0; }catch(e){} estVid.play().catch(()=>{});
  } else { game.estDur=2800; if(estVid){ try{ estVid.pause(); }catch(e){} } }
}
function estActive(){ return game.estDur>0 && game.estT<game.estDur && sceneImg(game.estScene); }
function estVidReady(){ return estVid && !estVid._err && game.estScene && ASSETS.areaVid && ASSETS.areaVid[game.estScene] && estVid.readyState>=2; }
function estDraw(){
  const im=sceneImg(game.estScene); if(!im) { game.estDur=0; return; }
  const t=game.estT, d=game.estDur, fin=clamp(t/450,0,1), fout=clamp((d-t)/500,0,1), a=Math.min(fin,fout);
  g.fillStyle='#000'; g.fillRect(0,0,VW,VH);
  if(estVid && estVid.paused && !estVid._err) estVid.play().catch(()=>{});   // keep the ambient clip rolling
  if(estVidReady()) drawCover(estVid, a, 0);                  // animated ambient establishing video
  else drawCover(im, a, Math.sin(t/900)*3 - 4);              // painted still fallback (slow drift)
  // cinematic letterbox bars
  g.globalAlpha=a; g.fillStyle='#000'; g.fillRect(0,0,VW,16); g.fillRect(0,VH-16,VW,16); g.globalAlpha=1;
  // place-name card
  g.globalAlpha=a; g.textAlign='center';
  fitText(game.estName,VW/2,VH/2-6,'#fff7e6',16,VW-28,true);
  if(t>700 && Math.floor(anim/52)%2) text('SPACE',VW/2,VH-26,'#e8e0d0',8);
  g.textAlign='left'; g.globalAlpha=1;
}
// draw an image OR video to fully cover the VW x VH screen (object-fit: cover), centred.
function drawCover(im, alpha, panY){ if(!im) return false;
  const iw=im.videoWidth||im.naturalWidth||im.width, ih=im.videoHeight||im.naturalHeight||im.height;
  if(!iw||!ih) return false;
  const s=Math.max(VW/iw, VH/ih), w=iw*s, h=ih*s;
  const dx=(VW-w)/2, dy=(VH-h)/2 + (panY||0);
  if(alpha!=null) g.globalAlpha=alpha; try{ g.drawImage(im,dx,dy,w,h); }catch(e){ g.globalAlpha=1; return false; } g.globalAlpha=1; return true; }

// ---- full-screen story-video cutscenes (4K mp4 played in-engine) ----
const story={ el:null, key:null, onDone:null, onMissing:null, t:0 };
function playStoryVideo(key, onDone, onMissing){
  const src = ASSETS.video && ASSETS.video[key];
  const fb = onMissing || onDone;
  if(!src){ if(fb) fb(); return; }                          // no file -> graceful fallback
  if(!story.el){ const v=document.createElement('video'); v.playsInline=true; v.setAttribute('playsinline',''); v.preload='auto'; story.el=v; }
  const v=story.el; story.key=key; story.onDone=onDone; story.onMissing=onMissing||onDone; story.t=0;
  v.onended=()=>finishStoryVideo(false);
  v.onerror=()=>finishStoryVideo(true);
  try{ v.src=src; v.currentTime=0; }catch(e){}
  v.muted=audio.muted; v.volume=audio.muted?0:0.8;
  game.state='video'; clearPressed();
  const p=v.play(); if(p&&p.catch) p.catch(()=>{});         // autoplay blocked -> SPACE skips
}
function finishStoryVideo(missing){ if(game.state!=='video') return;
  const cb = missing? story.onMissing : story.onDone; story.onDone=null; story.onMissing=null;
  if(story.el){ try{ story.el.pause(); }catch(e){} story.el.onended=null; story.el.onerror=null; }
  if(cb) cb(); }
function videoUpdate(dt){ story.t+=dt;
  if(story.t>700 && consume('ok')){ finishStoryVideo(false); return; }   // skippable
  if(story.el && story.el.ended) finishStoryVideo(false); }
function videoDraw(){ g.fillStyle='#000'; g.fillRect(0,0,VW,VH);
  const v=story.el; let drew=false;
  if(v && v.readyState>=2) drew=drawCover(v,1,0);
  g.fillStyle='#000'; g.fillRect(0,0,VW,13); g.fillRect(0,VH-13,VW,13);   // cinematic letterbox
  if(story.t>900 && Math.floor(anim/52)%2){ g.textAlign='center'; text('SPACE  ▸  skip', VW/2, VH-9, '#e8e0d0', 7); g.textAlign='left'; } }
loadAssetImages();

// ---------- input ----------
const keys = {}, pressed = {};
const KMAP = {
  ArrowUp:'up', KeyW:'up', ArrowDown:'down', KeyS:'down',
  ArrowLeft:'left', KeyA:'left', ArrowRight:'right', KeyD:'right',
  Enter:'ok', Space:'ok', KeyZ:'ok', KeyJ:'ok',
  Escape:'menu', KeyM:'mute', KeyH:'objtoggle',
  ShiftLeft:'run', ShiftRight:'run'
};
addEventListener('keydown', e=>{
  const k = KMAP[e.code]; if(!k) return;
  e.preventDefault();
  if(!keys[k]) pressed[k] = true;
  keys[k] = true;
  if(!audio.started) audio.start();
  if(k==='mute') setVolume(settings.volume===0 ? 3 : 0);   // M = quick mute toggle (Off <-> High)
  if(k==='objtoggle' && !e.repeat){ settings.objMin=!settings.objMin; saveSettings(); if(audio.started) audio.sfx('cursor'); }   // H = collapse/expand objective bar
});
addEventListener('keyup', e=>{ const k=KMAP[e.code]; if(k){ e.preventDefault(); keys[k]=false; } });
function consume(k){ if(pressed[k]){ pressed[k]=false; return true; } return false; }
function clearPressed(){ for(const k in pressed) pressed[k]=false; }
// pointer / click support on the title screen (New Game / Continue are clickable)
cv.addEventListener('pointerdown', (ev)=>{
  if(!audio.started) audio.start();
  const r=cv.getBoundingClientRect();
  const mx=(ev.clientX-r.left)/r.width*VW, my=(ev.clientY-r.top)/r.height*VH;
  if(game.state==='title'){
    if(titleComplete()){
      // left-stacked menu: New Game (top) / Continue (below)
      if(mx>=10 && mx<=120){
        if(my>=96 && my<=118){ game.titleSel=0; audio.sfx('confirm'); startCardScan(); }
        else if(my>=120 && my<=142){ game.titleSel=1; audio.sfx('confirm'); const s=saveSystem.load(); if(s) restoreGame(s); else startCardScan(); }
      }
    } else if(saveSystem.hasSave()){
      if(my>114 && my<140){
        audio.sfx('confirm');
        if(mx < VW/2){ startCardScan(); } else { const s=saveSystem.load(); if(s) restoreGame(s); }
      }
    } else { audio.sfx('confirm'); startCardScan(); }
    return;
  }
  if(game.state==='cardscan'){ pressed['ok']=true; return; }   // tap = SPACE (scan / advance)
  if(game.state==='charintro'){
    const s=CHARINTRO_START, k=CHARINTRO_BACK;
    if(mx>=s.x && mx<=s.x+s.w && my>=s.y && my<=s.y+s.h){ game.charSel=1; charIntroConfirm(); }
    else if(mx>=k.x && mx<=k.x+k.w && my>=k.y && my<=k.y+k.h){ game.charSel=0; charIntroConfirm(); }
    return;
  }
  if(game.state==='catch'){ pressed['ok']=true; return; }   // tap = SPACE (throw / advance)
  if(game.paused) return;                          // pause menu stays keyboard-driven
  if(game.state==='battle'){ battlePointer(mx,my); return; }
  // tapping the objective bar collapses/expands it (don't also fire an interact)
  if(game.objRect){ const r=game.objRect;
    if(mx>=r.x && mx<=r.x+r.w && my>=r.y && my<=r.y+r.h){ settings.objMin=!settings.objMin; saveSettings(); audio.sfx('cursor'); return; } }
  // dialogue, cutscenes, intro pages, story videos, cinema, credits: a click = SPACE (advance / skip)
  pressed['ok']=true;
});

// ---------- on-screen touch controls (mobile) ----------
function bindTouchBtn(el, key){
  const down=(e)=>{ e.preventDefault(); if(!keys[key]) pressed[key]=true; keys[key]=true; el.classList.add('on');
    if(typeof audio!=='undefined' && !audio.started) audio.start(); };
  const up=(e)=>{ e.preventDefault(); keys[key]=false; el.classList.remove('on'); };
  el.addEventListener('pointerdown',down);
  el.addEventListener('pointerup',up);
  el.addEventListener('pointercancel',up);
  el.addEventListener('pointerleave',up);
  el.addEventListener('contextmenu',e=>e.preventDefault());
}
(function setupTouchControls(){
  const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints>0);
  const root=document.getElementById('touch'); if(!root || !isTouch) return;
  root.style.display='block';
  const hint=document.getElementById('hint'); if(hint) hint.style.display='none';
  const map={ 'tc-up':'up','tc-down':'down','tc-left':'left','tc-right':'right','tc-a':'ok','tc-menu':'menu' };
  for(const id in map){ const b=document.getElementById(id); if(b) bindTouchBtn(b, map[id]); }
})();

// ---------- helpers ----------
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
function rrect(x,y,w,h,r,col){ g.fillStyle=col; g.beginPath();
  g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r); g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); g.fill(); }
function rect(x,y,w,h,c){ g.fillStyle=c; g.fillRect(x,y,w,h); }
function circle(x,y,r,c){ g.fillStyle=c; g.beginPath(); g.arc(x,y,r,0,7); g.fill(); }
function ellipse(x,y,rx,ry,c){ g.fillStyle=c; g.beginPath(); g.ellipse(x,y,rx,ry,0,0,7); g.fill(); }
function poly(pts,c){ g.fillStyle=c; g.beginPath(); g.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) g.lineTo(pts[i][0],pts[i][1]); g.closePath(); g.fill(); }
function tri(a,b,c,col){ poly([a,b,c],col); }
function rpath(x,y,w,h,r){ g.beginPath(); g.moveTo(x+r,y); g.arcTo(x+w,y,x+w,y+h,r);
  g.arcTo(x+w,y+h,x,y+h,r); g.arcTo(x,y+h,x,y,r); g.arcTo(x,y,x+w,y,r); g.closePath(); }
// clean DS-style window: dark rim, white frame, soft gradient interior, blue keyline
function uiBox(bx,by,bw,bh,accent){
  g.save(); g.shadowColor='rgba(8,6,14,.42)'; g.shadowBlur=3.5; g.shadowOffsetY=2;   // soft drop shadow so the panel lifts off the painting
  rrect(bx,by,bw,bh,6,'#22283c');
  g.restore();
  rrect(bx+2,by+2,bw-4,bh-4,5,'#efe7d2');                                             // warm inner border
  const gr=g.createLinearGradient(0,by,0,by+bh); gr.addColorStop(0,'#fdfaf0'); gr.addColorStop(1,'#f0e6cf');
  g.fillStyle=gr; rpath(bx+4,by+4,bw-8,bh-8,4); g.fill();                             // warm parchment fill (matches the cream HP bars + golden world)
  g.strokeStyle=accent||'#caa96a'; g.lineWidth=1; rpath(bx+4.5,by+4.5,bw-9,bh-9,4); g.stroke();   // soft gold accent
}

// ---------- pixel text ----------
g.textBaseline = 'top';
let fontBold=false;
const FONT_FAMILY = '"Fredoka","Trebuchet MS","Segoe UI",system-ui,sans-serif';   // friendly rounded game font (falls back cleanly if the webfont is offline)
function setFont(px){ g.font = (fontBold?'700 ':'500 ')+px+'px '+FONT_FAMILY; }
function tw(s){ return g.measureText(s).width; }
function text(s,x,y,col,px){ setFont(px||8); g.fillStyle=col; g.fillText(s,x,y); }
function textShadow(s,x,y,col,sh,px){ setFont(px||8); g.fillStyle=sh||'#000'; g.fillText(s,x+1,y+1); g.fillStyle=col; g.fillText(s,x,y); }
// draw a single line, auto-shrinking the font until it fits maxw (never overflows its box)
function fitText(s,x,y,col,px,maxw,shadow){ let p=px||8; setFont(p);
  while(p>5 && tw(s)>maxw){ p-=0.5; setFont(p); }
  if(shadow){ g.fillStyle='rgba(0,0,0,.6)'; g.fillText(s,x+1,y+1); }   // clean dark drop shadow (a white offset read as doubled text)
  g.fillStyle=col; g.fillText(s,x,y); }
function wrap(s,maxw,px){
  setFont(px||8);
  const lines=[]; let cur='';
  const push=()=>{ if(cur){ lines.push(cur); cur=''; } };
  for(let w of (s+'').split(' ')){
    // hard-break any single token that is wider than the line on its own
    while(tw(w) > maxw && w.length>1){
      let i=1; while(i<w.length && tw(w.slice(0,i+1))<=maxw) i++;
      if(cur) push();
      lines.push(w.slice(0,i)); w=w.slice(i);
    }
    const t = cur? cur+' '+w : w;
    if(tw(t) > maxw && cur){ push(); cur=w; } else cur=t;
  }
  push();
  return lines.length?lines:[''];
}

const audio = {
  started:false, muted:false, ctx:null, master:null, music:null, loop:null, idx:0, track:null, noiseBuf:null,
  files:null, musicEl:null,
  start(){

    // built-in chiptune keeps playing (lets us declare paths before the mp3s are downloaded).

    for(const n in ASSETS.music){ if(ASSETS.music[n]) reg(this.files.music,n,ASSETS.music[n],true); }
    for(const n in ASSETS.sfx){ if(ASSETS.sfx[n]) reg(this.files.sfx,n,ASSETS.sfx[n],false); }

  play(name){
    // already on this exact track and it's still playing? leave it running so the music
    // never cuts when the player walks between maps (used for the dramatic post-Rook theme).
    if(name===this.track){
      if(this.files && this.files.music[name]){ if(this.musicEl===this.files.music[name] && this.musicEl && !this.musicEl.paused) return; }
      else if(this.loop) return;
    }
    this.track=name;
    this.fanfareId=(this.fanfareId||0)+1;   // any track change cancels a pending fanfare resume
    // custom music file takes priority over the built-in chiptune
    if(this.files && this.files.music[name]){
      if(this.loop){ clearInterval(this.loop); this.loop=null; }
      this.cutMusic();                                              // silence any synth tails
      if(this.musicEl && this.musicEl!==this.files.music[name]) this.musicEl.pause();
      this.musicEl=this.files.music[name];
      try{ this.musicEl.currentTime=0; }catch(e){}
      this.musicEl.volume=this.muted?0:0.6; this.musicEl.loop=true; this.musicEl.play().catch(()=>{});
      return;
    }
    if(this.musicEl){ this.musicEl.pause(); this.musicEl=null; }   // switching back to synth
    if(!this.ctx){ return; }
    if(this.loop){ clearInterval(this.loop); this.loop=null; }
    this.cutMusic();                                                // silence previous track's ringing notes
    const tr=this.tracks[name]; if(!tr) return;
    this.idx=0;
    const step=()=>{
      const i=this.idx, sec=tr.tempo/1000;
      const lf=tr.lead[i%tr.lead.length];
      const bf=tr.bass[i%tr.bass.length];
      const af=tr.arp? tr.arp[i%tr.arp.length]:0;
      const dr=tr.drum? tr.drum[i%tr.drum.length]:'.';
      if(lf) this.lead(lf, sec*1.5, 0.30);
      if(bf) this.note(bf/2, sec*1.7, 'triangle', 0.5);
      if(af) this.note(af, sec*0.5, 'square', 0.09);
      // sustained pad chord on each bar = warmer, fuller original soundtrack
      if(i%8===0 && bf){ this.note(bf, sec*8, 'triangle', 0.10); this.note(bf*1.26, sec*8, 'triangle', 0.06); this.note(bf*1.5, sec*8, 'sine', 0.07); }
      if(dr==='k'){ this.note(70,0.14,'sine',0.7); this.noise(0.05,0.25); }
      else if(dr==='s'){ this.noise(0.10,0.32,0,1500); this.note(180,0.06,'triangle',0.3); }
      else if(dr==='h'){ this.noise(0.035,0.10,0,6000); }
      this.idx++;
    };
    step(); this.loop=setInterval(step, tr.tempo);

// dir: 'down','up','left','right' ; frame 0/1 walk
// dir: 'down','up','left','right'.  mv: motion descriptor from drawWorld -
//   { g:<gaitPhase>, run } while walking, or { idle:<breathPhase> } while standing.
function drawChar(kind,x,y,dir,mv){
  const im=ASSETS._img['char:'+kind];
  if(im){ ellipse(x+8,y+15,5,2,C.shadow); g.drawImage(im, x, y-2, 16, 18); return; } // custom sprite
  const p = CHAR[kind]; if(!p) return;
  const cx = x+8; // tile center
  // ---- motion ----
  const walking = !!(mv && typeof mv==='object' && mv.g!=null);
  const gait = walking ? mv.g : 0;
  const amp  = (walking && mv.run) ? 1.5 : 1;                       // running exaggerates the stride
  const sw   = walking ? Math.sin(gait) : 0;                        // limb swing, -1..1, alternating each step
  const idlePh = (mv && mv.idle!=null) ? mv.idle : anim*0.045;
  const breath = walking ? 0 : Math.sin(idlePh)*0.45;              // gentle chest rise while standing
  const bob = (walking ? -Math.abs(Math.sin(gait))*0.9*amp : 0) + breath;   // hips/torso lift at mid-step
  if(p.poppy){ drawPoppy(cx,y,dir,{sw,amp,bob},p); return; }
  const by = y + bob;
  const faceX = dir==='right'?1 : dir==='left'?-1 : 0;               // sideways facing
  const lean  = faceX * (walking ? Math.abs(sw)*0.7 : 0);            // upper body leans into a sideways stride
  // ---- legs: feet stay near the ground, hips ride the bob, the swing foot lifts (no detaching) ----
  const groundY=y+15, hipY=by+11, lift=1.7*amp;

// Poppy-style trainer: neat cream sun-bonnet, navy bob, small friendly eyes,
// grey coat + pleated skirt, yellow tights, blue shoes. Natural proportions.
function drawPoppy(cx,y,dir,mv,p){
  const navy=p.hair, cream=p.bonnet, lining=p.bonnetB, coat=p.coat, white=p.collar;
  const back = dir==='up';
  const ex = dir==='left'? -0.6 : dir==='right'? 0.6 : 0;   // face/eye shift
  // motion: sw = limb swing (-1..1), bob = upper-body lift; accepts the legacy frame number too
  const sw  = (mv&&typeof mv==='object') ? (mv.sw||0)  : 0;
  const amp = (mv&&typeof mv==='object') ? (mv.amp||1) : 1;
  const bob = (mv&&typeof mv==='object') ? (mv.bob||0) : (mv?0.6:0);
  const lkL=Math.max(0,sw)*1.3*amp, lkR=Math.max(0,-sw)*1.3*amp;        // alternating foot lift
  const strideX=(dir==='left'||dir==='right') ? sw*0.9*amp : 0;
  // ---- legs (yellow tights) + blue shoes (animated) ----
  rect(cx-2.6+strideX, y+12-lkL, 1.9, 3, p.legs); rect(cx+0.7-strideX, y+12-lkR, 1.9, 3, p.legs);
  rrect(cx-3.2+strideX, y+14-lkL, 2.7, 1.8, 0.8, p.shoes); rrect(cx+0.5-strideX, y+14-lkR, 2.7, 1.8, 0.8, p.shoes);
  // everything above the legs rides the bob
  y = y + bob;
  // ---- flared pleated skirt ----
  poly([[cx-2.8,y+9],[cx+2.8,y+9],[cx+4.4,y+13],[cx-4.4,y+13]], coat);
  rect(cx-2,y+10,0.7,3,'#aab6c6'); rect(cx-0.2,y+10,0.7,3,'#aab6c6'); rect(cx+1.4,y+10,0.7,3,'#aab6c6');
  poly([[cx-4.4,y+13],[cx+4.4,y+13],[cx+3.7,y+12],[cx-3.7,y+12]], '#9aa8ba'); // hem shadow
  // ---- coat torso + buttons ----
  rrect(cx-3.3, y+6, 6.6, 4, 1.7, coat);
  rect(cx-0.4, y+7, 0.9, 0.9, '#e6ecf6'); rect(cx-0.4, y+8.5, 0.9, 0.9, '#e6ecf6');
  // ---- arms + skin hands (swing opposite the legs) ----
  const armS=sw*1.0*amp;
  rrect(cx-4.9, y+6.3+armS, 1.7, 3.4, 0.9, coat); rrect(cx+3.2, y+6.3-armS, 1.7, 3.4, 0.9, coat);
  rect(cx-4.9, y+9+armS, 1.7, 1, p.skin); rect(cx+3.2, y+9-armS, 1.7, 1, p.skin);
  // ---- white collar ----
  tri([cx-1.7,y+5.7],[cx,y+7.1],[cx+1.7,y+5.7], white);
  // ---- HEAD (natural proportions) ----
  const hy=y+3.2, hr=3.1;
  circle(cx, hy, hr, p.skin);
  // navy bob framing the cheeks
  rrect(cx-hr-0.3, hy-1.1, 1.3, 3.5, 0.6, navy);
  rrect(cx+hr-1.0, hy-1.1, 1.3, 3.5, 0.6, navy);
  if(!back){
    const ey=hy+0.5;
    // small friendly eyes + tiny highlight
    ellipse(cx-1.4+ex, ey, 0.68, 0.92, '#2b2336'); ellipse(cx+1.4+ex, ey, 0.68, 0.92, '#2b2336');
    rect(cx-1.7+ex, ey-0.5, 0.45, 0.45, '#fff'); rect(cx+1.15+ex, ey-0.5, 0.45, 0.45, '#fff');
    // rosy cheeks + tiny smile
    circle(cx-2.2+ex, hy+1.4, 0.6, 'rgba(245,162,182,.7)');
    circle(cx+2.2+ex, hy+1.4, 0.6, 'rgba(245,162,182,.7)');
    rect(cx-0.4+ex, hy+1.6, 0.9, 0.4, '#c0707e');
  }
  // ---- NEAT sun-bonnet (proportional, sits on the head) ----
  // navy fringe peeking just under the brim
  rrect(cx-2.3, hy-1.4, 4.6, 1.5, 0.7, navy);
  // brim (blue-grey), modest width, just above the eyes
  ellipse(cx, y+1.1, 5.4, 1.5, lining);
  ellipse(cx, y+0.5, 5.0, 1.1, cream);
  // dome (cream), proportional
  ellipse(cx, y-0.7, 4.6, 3.0, cream);
  // small floppy back tip
  poly([[cx+3.2,y-0.8],[cx+6.2,y-1.8],[cx+3.6,y+0.9]], cream);
  ellipse(cx+5.4, y-1.5, 1.1, 0.8, lining);
  // soft highlight
  ellipse(cx-1.5, y-1.5, 1.9, 1.1, '#fbf7cc');
}

function drawWall(sx,sy,S){
  rect(sx,sy,TS,TS,S.wall);
  rect(sx,sy,TS,2,S.wt); rect(sx,sy+TS-2,TS,2,S.wb);
  if(S.mat==='brick'){
    g.globalAlpha=0.55;
    for(let r=0;r<5;r++) rect(sx,sy+1.6+r*3,TS,0.7,S.mortar);                                  // mortar courses
    for(let r=0;r<5;r++){ const off=(r%2)?4:0; for(let c=-1;c<3;c++) rect(sx+off+c*8+3,sy+1.6+r*3,0.7,3,S.mortar); }   // staggered head joints

    g.globalAlpha=0.5; g.strokeStyle=S.mortar; g.lineWidth=0.7; g.beginPath();
    for(let r=0;r<4;r++){ const ry=sy+2+r*3.4; g.moveTo(sx,ry); g.lineTo(sx+TS,ry); }
    for(let r=0;r<4;r++){ const off=(r%2)?6:0, ry=sy+2+r*3.4; g.moveTo(sx+off+5,ry); g.lineTo(sx+off+5,ry-3.4); g.moveTo(sx+off+11,ry); g.lineTo(sx+off+11,ry-3.4); }

const SOLID = new Set(['#','T','=','b','C','M','w','c','F','V','|','A','B','R','E','h','S','G','g','r','L','k','o','i','j','e','Q','Y']);
function makeGrid(w,h,fill){ const a=[]; for(let y=0;y<h;y++){ a.push(new Array(w).fill(fill)); } return a; }
function setBorder(grid,ch){ const h=grid.length,w=grid[0].length;
  for(let x=0;x<w;x++){ grid[0][x]=ch; grid[h-1][x]=ch; }
  for(let y=0;y<h;y++){ grid[y][0]=ch; grid[y][w-1]=ch; } }
function setRect(grid,x,y,w,h,ch){ for(let j=y;j<y+h;j++) for(let i=x;i<x+w;i++) if(grid[j]&&grid[j][i]!==undefined) grid[j][i]=ch; }

// ---- build each map ----

    for(let y=1;y<h-1;y++){ t[y][7]='p'; }

    setRect(t,2,4,3,2,'g'); setRect(t,10,5,3,2,'g'); setRect(t,3,10,2,2,'g'); setRect(t,9,11,3,2,'g');
    // trees scattered
    t[5][4]='T'; t[6][10]='T'; t[10][4]='T'; t[11][11]='T'; t[3][11]='T';
    // flowers + sign
    t[13][4]='f'; t[13][10]='f'; t[2][9]='s';
    // top opening = lab entry (y=0 col7 becomes path-ish but it's a warp). bottom blocked.
    t[0][7]='p'; // visual opening top (north onward)
    M.route1 = { theme:'route', w, h, tiles:t, spawn:{x:7,y:14,dir:'up'},
      warps:[
        {x:7,y:15,to:'lab',tx:7,ty:10,dir:'up'},     // walk to bottom -> back to lab
        {x:7,y:0,to:'__north',tx:0,ty:0,dir:'up'}     // north onward (gated by flag)
      ] };
  }

  // ===== STATION =====
  {
    const w=13,h=12, t=makeGrid(w,h,'.');

    t[1][4]='e'; t[1][8]='e';                     // hazard warning signs
    t[5][1]='k'; t[5][11]='k';                    // control consoles
    t[8][1]='j'; t[8][11]='j';                    // battery banks
    t[10][1]='o'; t[10][11]='o';                  // transformers
    t[9][3]='u'; t[9][9]='u';                      // floor conduits
    t[4][2]='x'; t[4][10]='x'; t[7][4]='x';        // hazard stripes under generators

  {

    t[7][2]='u'; t[7][10]='u';                     // ember scatter
    t[4][5]='x'; t[4][7]='x';                       // oil stains near the furnace
    t[h-1][6]='_';

  {

  }

  // ===== HIDEOUT =====
  {
    const w=13,h=12, t=makeGrid(w,h,'.');

    t[2][2]='M'; t[2][10]='M'; t[6][2]='M'; t[6][10]='M';  // machines / empty capsules

  // ===== TOWN (large city hub with a downtown skyline) =====
  {
    const w=46,h=40, t=makeGrid(w,h,'.');
    setBorder(t,'T');
    const sg=makeGrid(w,h,0);   // per-building material-style grid (parallel to the tile grid)
    const inb=(x,y)=>t[y]&&t[y][x]!==undefined;
    const stampStyle=(x,y,bw,bh,st)=>{ for(let yy=y;yy<y+bh;yy++){ if(!sg[yy]) continue; for(let xx=x;xx<x+bw;xx++){ if(sg[yy][xx]!==undefined) sg[yy][xx]=st; } } };
    const path=(x0,y0,x1,y1)=>{ for(let y=y0;y<=y1;y++) for(let x=x0;x<=x1;x++) if(inb(x,y)&&t[y][x]==='.') t[y][x]='p'; };

      else if(bh>=2){ const dx=x+((bw-1)>>1); if(inb(dx,y+bh-1)) t[y+bh-1][dx]='g'; }

/* =========================================================================
   DIALOGUE
   ========================================================================= */
const dlg = { active:false, pages:[], pi:0, reveal:0, name:'', done:false, cb:null };
function say(pagesOrText, cb){
  // pagesOrText: array of {name,text} OR single {name,text}
  let pages = Array.isArray(pagesOrText)? pagesOrText : [pagesOrText];
  // pre-wrap each into max 3 lines, splitting longer into more pages
  const out=[];
  for(const p of pages){
    const lines = wrap(p.text, VW-44, 8);   // conservative inner width so text never spills past the frame
    for(let i=0;i<lines.length;i+=3){
      out.push({name:p.name||'', lines:lines.slice(i,i+3)});
    }
  }
  dlg.active=true; dlg.pages=out; dlg.pi=0; dlg.reveal=0; dlg.cb=cb; dlg.done=false; dlg.fast=false;
}
function dlgUpdate(){
  if(!dlg.active) return;
  const page=dlg.pages[dlg.pi];
  const full = page.lines.join('\n').length;
  if(dlg.reveal < full){ const before=dlg.reveal|0; dlg.reveal += dlg.fast?TEXT_FAST:textRevealStep();
    if((dlg.reveal|0)>before && ((dlg.reveal|0)%6)===0) audio.note(620,0.025,'square',0.07); }
  if(consume('ok')){
    if(dlg.reveal < full){ dlg.reveal=full; }   // first Space fills the line instantly; next Space advances
    else {
      audio.sfx('confirm');
      dlg.pi++;
      if(dlg.pi>=dlg.pages.length){ dlg.active=false; const cb=dlg.cb; dlg.cb=null; if(cb) cb(); }
      else { dlg.reveal=0; dlg.fast=false; }
    }
  }
}
function dlgDraw(){
  if(!dlg.active) return;
  const bx=6, by=VH-54, bw=VW-12, bh=48;
  uiBox(bx,by,bw,bh);
  const page=dlg.pages[dlg.pi];
  g.textBaseline='top';                 // glyph TOP sits at ty - predictable padding regardless of prior state
  let ty=by+9;                          // 3 lines (lh 12) fit evenly: by+9, +21, +33 -> bottom ~by+41 in a 48px box
  if(page.name){
    g.textBaseline='middle'; setFont(8);
    const tagW=Math.min(tw(page.name)+10, bw-12);   // never let the name tag exceed the box
    rrect(bx+8,by-9,tagW,13,4,'#1d2336'); rrect(bx+9,by-8,tagW-2,11,3,'#4a73c0');
    fitText(page.name,bx+13,by-2,'#fff',8,tagW-10);  // centered in the tag; shrink so it never spills
    g.textBaseline='top';
  }
  // revealed text (clipped to the box as a safety net so it can never spill out)
  g.save(); g.beginPath(); g.rect(bx+8,by+5,bw-16,bh-9); g.clip();
  let count=dlg.reveal|0;
  for(const ln of page.lines){
    const show = ln.slice(0, Math.max(0,count));
    text(show, bx+12, ty, '#283048',8);
    count -= ln.length; if(count<0) count=0;
    ty+=12;
  }
  g.restore();
  g.textBaseline='alphabetic';
  // calm blinking advance arrow
  const full=page.lines.join('\n').length;
  if((dlg.reveal|0)>=full && Math.floor(anim/58)%2){ const ay=by+bh-9+(Math.floor(anim/30)%2?0:1); poly([[bx+bw-14,ay-3],[bx+bw-8,ay-3],[bx+bw-11,ay+1]],'#4a73c0'); }
}

/* =========================================================================
   SEQUENCER (cutscenes)
   action types:
   say {name,text} | wait {ms} | flag {set} | clearflag {name}
   objective {text} | spawn {entity} | despawn {id} | move {id,path:[dirs]}
   setdir {id,dir} | face {id,dir} | flash {col,ms} | shake {ms}
   fade {dir:'out'|'in'} | warp {to,tx,ty,dir,travel} | battle {cfg}
   hearts {id} | spark {id,col} | func {fn} | music {name} | sfx {name}
   ========================================================================= */
let activeSeq = null;
class Seq {
  constructor(actions,onDone){ this.a=actions.slice(); this.i=0; this.busy=false; this.tick=null; this.done=false; this.onDone=onDone; }
  resolve(){ this.busy=false; this.tick=null; }
  update(dt){
    if(this.done) return;
    if(activeSeq!==this){ this.done=true; return; }   // superseded by a new sequence (e.g. a warp)
    if(this.busy){ if(this.tick) this.tick(dt); return; }
    let guard=0;
    while(!this.busy && this.i<this.a.length && guard++<200){
      this.exec(this.a[this.i++]);
      if(activeSeq!==this){ this.done=true; return; }
    }
    if(!this.busy && this.i>=this.a.length){ this.done=true; const f=this.onDone; if(f) f(); }
  }
  exec(act){
    switch(act.type){
      case 'say': this.busy=true; say(act.pages||{name:act.name,text:act.text}, ()=>this.resolve()); break;
      case 'wait': { this.busy=true; let t=act.ms; this.tick=(dt)=>{ t-=dt; if(t<=0) this.resolve(); }; break; }
      case 'flag': F[act.set]=true; break;
      case 'clearflag': delete F[act.name]; break;
      case 'objective': game.objective=act.text; break;
      case 'spawn': placeEntity(newEntity(act.entity)); break;
      case 'despawn': { const e=findEnt(act.id); if(e){ if(act.hearts) spawnHearts(e.px+8,e.py); game.entities=game.entities.filter(x=>x!==e); } break; }
      case 'show': { const e=findEnt(act.id); if(e) e.visible=true; break; }
      case 'hide': { const e=findEnt(act.id); if(e) e.visible=false; break; }
      case 'face': case 'setdir': { const e= act.id==='player'?game.player:findEnt(act.id); if(e) e.dir=act.dir; break; }
      case 'move': { const e= act.id==='player'?game.player:findEnt(act.id); if(!e){ break;} e.walkPath=act.path.slice(); this.busy=true;
        this.tick=()=>{ if(!e.stepping && (!e.walkPath||e.walkPath.length===0)) this.resolve(); }; break; }
      // walk an entity over to Oen, landing on an EMPTY tile beside him (never on top of the player or an object)
      case 'approach': { const e=findEnt(act.id), p=game.player; if(!e||!p){ break; }
        const around=[[p.tx,p.ty+1,'up'],[p.tx,p.ty-1,'down'],[p.tx+1,p.ty,'left'],[p.tx-1,p.ty,'right']];
        let target=null,bD=1e9;
        for(const c of around){ const tx=c[0],ty=c[1];
          if(!walkable(game.map,tx,ty)) continue;
          if(tx===p.tx&&ty===p.ty) continue;
          if(game.entities.some(o=>o!==e&&o.solid&&o.tx===tx&&o.ty===ty)) continue;
          const d=Math.abs(tx-e.tx)+Math.abs(ty-e.ty); if(d<bD){ bD=d; target=c; } }
        if(!target){ break; }                                  // nowhere clean to stand: leave it put
        const path=[]; let cx=e.tx, cy=e.ty, guard=0;           // greedy vertical-then-horizontal path, skipping walls
        while((cx!==target[0]||cy!==target[1]) && guard++<40){ let moved=false;
          if(cy!==target[1]){ const ny=cy+(cy<target[1]?1:-1); if(walkable(game.map,cx,ny)){ path.push(cy<target[1]?'down':'up'); cy=ny; moved=true; } }
          if(!moved && cx!==target[0]){ const nx=cx+(cx<target[0]?1:-1); if(walkable(game.map,nx,cy)){ path.push(cx<target[0]?'right':'left'); cx=nx; moved=true; } }
          if(!moved) break; }
        e.walkPath=path; this.busy=true;
        this.tick=()=>{ if(!e.stepping && (!e.walkPath||e.walkPath.length===0)){
          e.tx=target[0]; e.ty=target[1]; e.px=target[0]*TS; e.py=target[1]*TS; e.dir=target[2]; this.resolve(); } }; break; }
      case 'flash': { game.flash=1; game.flashCol=act.col||'#fff'; this.busy=true; let t=act.ms||300; this.tick=(dt)=>{ t-=dt; game.flash=clamp(t/(act.ms||300),0,1); if(t<=0){ game.flash=0; this.resolve(); } }; break; }
      case 'shake': { game.shake=act.ms||300; this.busy=true; let t=act.ms||300; this.tick=(dt)=>{ t-=dt; if(t<=0) this.resolve(); }; break; }
      case 'hearts': { const e= act.id==='player'?game.player:findEnt(act.id); if(e) spawnHearts(e.px+8,e.py); break; }
      case 'spark': { const e= act.id==='player'?game.player:findEnt(act.id); if(e) spawnSpark(e.px+8,e.py+6,10,act.col); break; }
      case 'music': audio.play(act.name); break;
      case 'sfx': audio.sfx(act.name); break;
      case 'func': if(act.fn) act.fn(); break;
      case 'video': { this.busy=true; const self=this; const cont=()=>{ game.state='cutscene'; self.resolve(); };
        playStoryVideo(act.key, cont, cont); break; }
      case 'fade': { this.busy=true; const out=act.dir==='out'; let t=0; const dur=act.ms||400;
        this.tick=(dt)=>{ t+=dt; const p=clamp(t/dur,0,1); game.fade= out? p : 1-p; if(t>=dur){ game.fade= out?1:0; this.resolve(); } }; break; }
      case 'warp': { enterMap(act.to, act.tx, act.ty, act.dir); break; }
      case 'travel': { this.busy=true; game.travelText=act.text||''; let t=act.ms||1400; this.tick=(dt)=>{ t-=dt; if(t<=0){ game.travelText=''; this.resolve(); } }; break; }
      case 'battle': { this.busy=true; startBattle(act.cfg, ()=>this.resolve()); break; }
      case 'levelup': { this.busy=true; startLevelUp(act.to, {stone:act.stone}, ()=>this.resolve()); break; }
      case 'endchoice': { this.busy=true; startCinema(); break; }
      case 'creditroll': { this.busy=true; startCredits(()=>this.resolve()); break; }
    }
  }
}
function runSeq(actions,onDone){ activeSeq=new Seq(actions,onDone); game.state='cutscene'; }

/* =========================================================================
   MOVEMENT
   ========================================================================= */
const DIRV={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
function walkable(map,tx,ty){
  if(tx<0||ty<0||tx>=map.w||ty>=map.h) return false;
  const ch=map.tiles[ty][tx];
  if(SOLID.has(ch)) return false;
  return true;
}
function tryStep(e, dir, ignoreEnt){
  e.dir=dir;
  const [dx,dy]=DIRV[dir];
  const ntx=e.tx+dx, nty=e.ty+dy;
  if(!walkable(game.map,ntx,nty)){ if(e===game.player){ e.bumpT=110; e.bumpDir=dir; } return false; }   // bump feedback on walls
  if(!ignoreEnt && entAt(ntx,nty)) return false;
  e.stepping=true; e.sp=0; e.fromx=e.px; e.fromy=e.py; e.tx=ntx; e.ty=nty;
  return true;
}
function updateEntity(e,dt){
  if(e.bumpT>0) e.bumpT-=dt;
  if(e.stepping){
    const inc = dt/((e===game.player && keys.run && game.state==='play')?95:158);   // hold Shift to run (a calmer, more natural walk pace)
    e.sp += inc;
    e.gait = (e.gait||0) + inc*Math.PI;                                              // continuous walk-cycle phase: π advances per footstep
    if(e.sp>=1){ e.sp=1; e.stepping=false; e.px=e.tx*TS; e.py=e.ty*TS; e.frame^=1;
      e.gait = Math.round(e.gait/Math.PI)*Math.PI;                                   // settle the cycle in-phase so the next step alternates legs cleanly
      if(e===game.player) onPlayerArrive();
      if(e.walkPath && e.walkPath.length){ const nd=e.walkPath.shift(); tryStep(e,nd,true); }
    } else {
      e.px=lerp(e.fromx,e.tx*TS,e.sp); e.py=lerp(e.fromy,e.ty*TS,e.sp);
    }
  } else if(e.walkPath && e.walkPath.length){
    const nd=e.walkPath.shift(); if(!tryStep(e,nd,true)){ /* blocked: skip */ }
  }
  // idle townsfolk glance around now and then so they don't read as statues
  if(e.idle && e!==game.player && !e.stepping && game.state==='play'){
    e.gazeT = (e.gazeT==null ? 1200+Math.random()*2600 : e.gazeT-dt);
    if(e.gazeT<=0){ e.dir = ['down','up','left','right'][Math.floor(Math.random()*4)]; e.gazeT = 1600+Math.random()*3200; }
  }
  // strolling townsfolk wander around their corner of town, then pause
  if(e.wander && e!==game.player && !e.stepping && game.state==='play'){
    e.wT = (e.wT==null ? 500+Math.random()*1600 : e.wT-dt);
    if(e.wT<=0){
      e.wT = 700+Math.random()*2400;
      const p=game.player, dirs=['up','down','left','right'].sort(()=>Math.random()-0.5);
      for(const d of dirs){
        const [dx,dy]=DIRV[d], nx=e.tx+dx, ny=e.ty+dy;
        if(Math.abs(nx-e.hx)>e.wr || Math.abs(ny-e.hy)>e.wr){ continue; }      // stay near home anchor
        if(!walkable(game.map,nx,ny) || entAt(nx,ny)) { e.dir=d; continue; }   // wall/other npc: at least turn that way
        if(p && nx===p.tx && ny===p.ty){ e.dir=d; continue; }                  // don't shove the player
        tryStep(e,d); break;
      }
    }
  }
  if(e.tick) e.tick(e,dt);   // per-entity custom animation (e.g. the soccer ball)
}
function onPlayerArrive(){
  const p=game.player;
  // warp check
  for(const wp of (game.map.warps||[])){
    if(wp.x===p.tx && wp.y===p.ty){
      // ENDING: after choosing Sylveon, stepping out the lab door rolls the credits
      if(F.endQuest && game.mapName==='lab'){ F.endQuest=false; game.state='cutscene'; startCredits(()=>{}); return; }
      if(wp.to==='__north'){ if(F.routeClear){ triggerNorth(); } return; }
      if(wp.gate && !F[wp.gate]){   // locked building: show a hint, don't enter
        if(!dlg.active && !activeSeq) runSeq([{type:'say',name:'Evo Tracker',text:wp.hint||'It\'s locked.'}],()=>{ game.state='play'; });
        return;
      }
      audio.sfx('door'); enterMap(wp.to, wp.tx, wp.ty, wp.dir); return;
    }
  }
}

function playUpdate(dt){
  const p=game.player;
  if(consume('menu')){ game.paused=true; pause.confirmQuit=false; return; }
  if(!p.stepping){
    let dir=null;
    if(keys.up) dir='up'; else if(keys.down) dir='down';
    else if(keys.left) dir='left'; else if(keys.right) dir='right';
    if(dir){ tryStep(p,dir); }
    if(consume('ok')){ interact(); }
  }
}
function interact(){
  const p=game.player; const [dx,dy]=DIRV[p.dir];
  const tx=p.tx+dx, ty=p.ty+dy;
  const e=game.entities.find(en=>en!==p && en.visible && en.tx===tx && en.ty===ty && en.talk);
  if(e){ e.dir = ({up:'down',down:'up',left:'right',right:'left'})[p.dir]||e.dir; e.talk(e); }
}

function updateCamera(){

  const mapW=m.w*TS, mapH=m.h*TS;

// theme-specific ambient particles (screen-space, procedural, no allocation)
function drawAmbient(theme){

      g.globalAlpha=0.12+gl*0.18; circle(px,py,2.4+gl,'#9fe060'); g.globalAlpha=0.4+gl*0.5; circle(px,py,1+gl*0.6,'#e8ffa0'); } g.globalAlpha=1;
  } else if(theme==='warehouse'){ // embers floating upward
    for(let i=0;i<16;i++){ const px=((i*53+Math.sin((t+i*40)/40)*7)%VW+VW)%VW, py=(VH+10-((t*0.03+i*43)%(VH+20))), gl=(Math.sin((t+i*22)/14)+1)/2;
      g.globalAlpha=0.3+gl*0.4; circle(px,py,0.8+gl*0.8, i%2?'#f08030':'#f6d62e'); } g.globalAlpha=1;
  } else if(theme==='station'){   // intermittent electric spark flickers
    for(let i=0;i<5;i++){ if((Math.floor(t/7)+i)%6!==0) continue; const px=(i*61+Math.floor(t/7)*13)%VW, py=18+(i*7)%50;
      g.strokeStyle='rgba(159,208,240,.8)'; g.lineWidth=0.8; g.beginPath(); g.moveTo(px,py); g.lineTo(px+3,py-3); g.lineTo(px+1,py-1); g.lineTo(px+4,py-5); g.stroke(); }
  } else if(theme==='hideout'){   // faint red motes
    for(let i=0;i<12;i++){ const px=((i*71+Math.sin((t+i*30)/60)*10)%VW+VW)%VW, py=((i*53+t*0.02)%VH);
      g.globalAlpha=0.10+0.10*((Math.sin((t+i*40)/30)+1)/2); circle(px,py,1,'#d86a96'); } g.globalAlpha=1;
  } else if(theme==='town'){      // drifting leaves swaying down + the odd flock gliding over
    for(let i=0;i<11;i++){ const py=((t*0.05+i*39)%(VH+24))-12, px=((i*71+Math.sin((t+i*60)/48)*12)%VW+VW)%VW;
      const a=0.18+0.12*((Math.sin((t+i*20)/26)+1)/2), col=i%3===0?'#e0a64a':(i%3===1?'#8fbf55':'#cf8a3a');
      g.save(); g.translate(px,py); g.rotate((t+i*90)/28); g.globalAlpha=a;
      ellipse(0,0,2.3,1.05,col); g.strokeStyle=col; g.lineWidth=0.5; g.beginPath(); g.moveTo(-2.3,0); g.lineTo(2.3,0); g.stroke();
      g.restore(); }
    g.globalAlpha=1;
    const bp=t%1000;                                   // a little flock drifts past now and then
    if(bp<300){ const prog=bp/300, baseX=VW*prog-10; g.strokeStyle='rgba(44,48,64,.5)'; g.lineWidth=1;
      for(let b=0;b<3;b++){ const bx=baseX-b*9, by=22+b*6+Math.sin(prog*6.28+b)*4, fl=Math.sin(t/4+b)*2.2;
        g.beginPath(); g.moveTo(bx-3,by+fl); g.lineTo(bx,by); g.lineTo(bx+3,by+fl); g.stroke(); } }
  } else if(theme==='lab'){       // slow dust motes
    for(let i=0;i<10;i++){ const px=((i*79+Math.sin((t+i*40)/80)*14)%VW+VW)%VW, py=((i*57+Math.sin((t+i*28)/65)*10)%VH+VH)%VH;
      g.globalAlpha=0.06+0.06*((Math.sin((t+i*22)/30)+1)/2); circle(px,py,1,'#ffffff'); } g.globalAlpha=1;

}
/* ---- town: soft cast-shadows that ground buildings & trees + street kerbs ---- */
const SHADOW_CASTERS = new Set(['B','R','E','D','G','g','r','A','h','T','o']);
function townShadowPass(m,x0,x1,y0,y1,ox,oy){
  const t=m.tiles;
  const caster=(x,y)=> !!(t[y]&&SHADOW_CASTERS.has(t[y][x]));
  const grass =(x,y)=> !!(t[y]&&t[y][x]==='.');
  const ground=(c)=> c==='.'||c==='p'||c==='P'||c==='x';
  for(let ty=Math.max(0,y0);ty<=Math.min(m.h-1,y1);ty++) for(let tx=Math.max(0,x0);tx<=Math.min(m.w-1,x1);tx++){
    const c=t[ty][tx]; if(!ground(c)) continue;
    const sx=tx*TS+ox, sy=ty*TS+oy;
    const n=caster(tx,ty-1), wst=caster(tx-1,ty), nw=caster(tx-1,ty-1);
    if(n){  g.globalAlpha=0.20; rect(sx,sy,TS,2,'#241f33'); g.globalAlpha=0.11; rect(sx,sy+2,TS,2,'#241f33'); g.globalAlpha=0.05; rect(sx,sy+4,TS,2,'#241f33'); g.globalAlpha=1; }
    if(wst){ g.globalAlpha=0.17; rect(sx,sy,2,TS,'#241f33'); g.globalAlpha=0.09; rect(sx+2,sy,2,TS,'#241f33'); g.globalAlpha=1; }
    if(nw&&!n&&!wst){ g.globalAlpha=0.15; rect(sx,sy,4,4,'#241f33'); g.globalAlpha=1; }
    if(c==='p'||c==='P'){                                                        // raised kerb where a street meets grass
      if(grass(tx,ty-1)){ rect(sx,sy,TS,1.4,'#d4d7de'); rect(sx,sy+1.4,TS,0.6,'rgba(88,92,102,.5)'); }
      if(grass(tx,ty+1)){ rect(sx,sy+TS-2,TS,0.6,'rgba(88,92,102,.5)'); rect(sx,sy+TS-1.4,TS,1.4,'#c6c9d0'); }
      if(grass(tx-1,ty)){ rect(sx,sy,1.4,TS,'#d4d7de'); rect(sx+1.4,sy,0.6,TS,'rgba(88,92,102,.5)'); }
      if(grass(tx+1,ty)){ rect(sx+TS-2,sy,0.6,TS,'rgba(88,92,102,.5)'); rect(sx+TS-1.4,sy,1.4,TS,'#c6c9d0'); }
    }
  }
}
/* ---- festival string lights strung around the plaza (sway + twinkle) ---- */
const FESTOON = [[16,15],[19,15],[27,15],[30,15],[30,26],[27,26],[19,26],[16,26]];
const FESTOON_COL = ['#ffd86a','#ff8f6a','#7fd0ff','#b6ff8a','#ff6ea6'];
function drawFestivalLights(ox,oy){
  const pt=(p)=>[p[0]*TS+8+ox, p[1]*TS+3+oy];
  g.lineCap='round';
  for(let s=0;s<FESTOON.length;s++){
    const a=pt(FESTOON[s]), b=pt(FESTOON[(s+1)%FESTOON.length]);
    if((a[0]<-40&&b[0]<-40)||(a[0]>VW+40&&b[0]>VW+40)||(a[1]<-40&&b[1]<-40)||(a[1]>VH+40&&b[1]>VH+40)) continue;
    const dx=b[0]-a[0], dy=b[1]-a[1], len=Math.hypot(dx,dy), sag=6+len*0.05, sway=Math.sin(anim/50+s)*1.2;
    const N=Math.max(6, Math.round(len/9));
    const yAt=(t)=> a[1]+dy*t + (Math.sin(Math.PI*t))*(sag+sway);
    g.strokeStyle='rgba(38,32,50,.7)'; g.lineWidth=1; g.beginPath();
    for(let i=0;i<=N;i++){ const t=i/N, x=a[0]+dx*t, y=yAt(t); i?g.lineTo(x,y):g.moveTo(x,y); } g.stroke();
    for(let i=0;i<=N;i++){ const t=i/N, x=a[0]+dx*t, y=yAt(t), gi=s*100+i, col=FESTOON_COL[gi%FESTOON_COL.length];
      const pulse=0.55+0.45*Math.sin(anim/16+gi*1.3);
      rect(x-0.6,y-0.4,1.2,1.1,'#3a3444');                                        // cap
      g.globalAlpha=0.22*pulse; circle(x,y+1.7,4,col); g.globalAlpha=0.4*pulse; circle(x,y+1.7,2.4,col); g.globalAlpha=1;   // glow
      circle(x,y+1.7,1.4,col); circle(x-0.4,y+1.3,0.6,'#fff8e0'); }               // bulb + specular
  }
  g.lineCap='butt';
}
function drawWorld(){
  const m=game.map; if(!m) return;
  rect(0,0,VW,VH,'#0c0e18');   // frame colour behind any margins
  let ox=-Math.round(game.cam.x), oy=-Math.round(game.cam.y);
  if(game.shake>0 && settings.shake){ ox += (Math.random()*2-1)*2|0; oy += (Math.random()*2-1)*2|0; }
  // tiles
  const x0=Math.floor(game.cam.x/TS), x1=Math.ceil((game.cam.x+VW)/TS);
  const y0=Math.floor(game.cam.y/TS), y1=Math.ceil((game.cam.y+VH)/TS);
  for(let ty=y0;ty<=y1;ty++) for(let tx=x0;tx<=x1;tx++){
    if(ty<0||tx<0||ty>=m.h||tx>=m.w){ continue; }
    drawTile(m.tiles[ty][tx], m.theme, tx*TS+ox, ty*TS+oy, tx, ty);
  }
  if(m.theme==='town') townShadowPass(m,x0,x1,y0,y1,ox,oy);   // ground buildings/trees with soft cast shadows + kerbs
  // entities sorted by y
  const ents=game.entities.filter(e=>e.visible).slice().sort((a,b)=>(a.py+ (a.kind==='mon'?8:0))-(b.py));
  for(const e of ents){
    const ex=Math.round(e.px+ox), ey=Math.round(e.py+oy);
    if(e.kind==='char'){ let bX=0,bY=0; if(e.bumpT>0){ const k=Math.sin((1-e.bumpT/110)*Math.PI)*2.4, bd=DIRV[e.bumpDir||'down']; bX=bd[0]*k; bY=bd[1]*k; }
      // motion descriptor: walking -> live gait phase; idle -> a desynced breathing phase so the crowd doesn't pulse in unison
      const mv = e.stepping ? { g:e.gait||0, run:(e===game.player&&keys.run&&game.state==='play') }
                            : { idle: anim*0.045 + (e.tx*7+e.ty*13)*0.6 };
      if(e.kick) mv.kick=e.kick;                                                   // soccer kids kick the ball
      const sq = e.stepping ? 1+Math.abs(Math.sin(e.gait||0))*0.06 : 1;            // contact shadow swells a touch as the body lifts
      if(e.sub) ellipse(ex+8+bX,ey+14,5*sq,2,C.shadow);
      drawChar(e.sub, ex+bX, ey-4+bY, e.dir, mv); }
    else if(e.kind==='mon'){ ellipse(ex+8,ey+15,5,2,C.shadow); const bob=Math.sin((anim+e.bob*10)/16)*1; drawMon(e.sub, ex+8, ey+8+bob, e.R||6); }
    else if(e.kind==='obj'){ if(e.draw) e.draw(ex,ey); }
  }
  if(m.theme==='town') drawFestivalLights(ox,oy);   // overhead plaza string lights (drawn above the crowd)
  // hearts/particles
  for(const h of game.hearts){ drawHeart(h.x+ox, h.y+oy, 3, clamp(1-h.t/h.life,0,1)); }
  for(const pr of game.particles){ g.globalAlpha=clamp(1-pr.t/pr.life,0,1); rect((pr.x+ox)|0,(pr.y+oy)|0,2,2,pr.col); g.globalAlpha=1; }
  drawAmbient(m.theme);   // theme atmosphere (fireflies / embers / sparks / pollen / dust)
  if(m.theme==='town'){   // warm golden-hour grade so the stone plaza glows instead of reading flat-grey
    const sun=g.createLinearGradient(0,0,0,VH);
    sun.addColorStop(0,'rgba(255,212,138,.15)'); sun.addColorStop(0.55,'rgba(255,206,150,.04)'); sun.addColorStop(1,'rgba(108,104,150,.07)');
    g.fillStyle=sun; g.fillRect(0,0,VW,VH);
    const gl=g.createRadialGradient(VW*0.30,VH*0.10,8,VW*0.30,VH*0.10,VH*0.95);   // soft sun glow from the upper-left, like the painted shot
    gl.addColorStop(0,'rgba(255,226,150,.13)'); gl.addColorStop(1,'rgba(255,226,150,0)');
    g.fillStyle=gl; g.fillRect(0,0,VW,VH);
  }
  // soft vignette for depth so the flat tile field reads as a lit space, not a grid
  const vg=g.createRadialGradient(VW/2,VH*0.46,VH*0.34,VW/2,VH*0.5,VH*0.92);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(18,16,28,.26)');
  g.fillStyle=vg; g.fillRect(0,0,VW,VH);
  // building name labels (town navigation)
  if(m.labels){ g.textAlign='center'; g.textBaseline='middle'; setFont(8); for(const L of m.labels){ const lx=L.x*TS+8+ox, ly=L.y*TS+oy;
    if(lx<-30||lx>VW+30||ly<-10||ly>VH+10) continue;
    const bw2=tw(L.t)+10, bh2=12;
    rrect(lx-bw2/2, ly-1, bw2, bh2, 3, 'rgba(252,250,240,.88)');
    textShadow(L.t, lx, ly-1+bh2/2, L.c||'#2a2a3a', 'rgba(255,255,255,.6)', 8); } g.textAlign='left'; g.textBaseline='top'; }
}

/* =========================================================================
   ENTER MAP + SCENE SETUP
   ========================================================================= */
function enterMap(name, tx, ty, dir){
  game.mapName=name; game.map=MAPS[name];
  game.entities=[]; game.hearts=[]; game.particles=[];
  game.fade=0; game.flash=0; game.shake=0; game.travelText='';
  const sp = (tx!==undefined)? {x:tx,y:ty,dir:dir||'down'} : game.map.spawn;
  game.player = placeEntity(newEntity({id:'player',kind:'char',sub:'oen',tx:sp.x,ty:sp.y,dir:sp.dir,solid:true}));
  game.state='play';
  setupScene(name);
  // silent autosave once the area has settled into normal play (never mid-story-cutscene)
  if(game.state==='play' && F && Object.keys(F).length){ saveSystem.save(); game.savedT=80; }
}

// Scene setup: spawn NPCs/objects per flags, and trigger cutscenes

  else if(name==='station'){ setupStation(); }
  else if(name==='warehouse'){ setupWarehouse(); }
  else if(name==='garden'){ setupGarden(); }

  else if(name==='keeper'){ setupKeeper(); }
}

      // shifting caustic light on the surface
      for(let c=0;c<3;c++){ const ca=anim/26+c*2.1; g.globalAlpha=0.10+0.07*Math.sin(anim/17+c); ellipse(cx+Math.cos(ca)*5,cy+3+Math.sin(ca)*1.5,2.6,1.1,'#d6f1ff'); } g.globalAlpha=1;
      // expanding ripples

        g.beginPath(); g.ellipse(cx,cy+3,2+r*1.6,1+r*0.7,0,0,7); g.stroke(); } g.globalAlpha=1;
      g.globalAlpha=0.55; g.strokeStyle='#dfe3ea'; g.lineWidth=1; g.beginPath(); g.ellipse(cx,cy+5.4,15.4,7.3,0,0.18,Math.PI-0.18); g.stroke(); g.globalAlpha=1;   // front-rim catch-light
      // ---- central pedestal + upper bowl ----
      rect(cx-3,cy-6,6,9,'#aab0ba'); rect(cx-3,cy-6,2,9,'#c8ccd4'); rect(cx+1.6,cy-6,1.2,9,'#888d97');               // pedestal w/ lit + shaded edges
      ellipse(cx,cy-6,5,2,'#b2b6c0'); ellipse(cx,cy-6.2,4,1.5,'#c8ccd4'); ellipse(cx,cy-6.6,3.2,1.1,'#5aa6d8');       // upper bowl + its little pool
      // ---- water jet + spray ----
      const jh=5.4+Math.sin(anim/12)*1.4; g.globalAlpha=0.85; g.strokeStyle='#dff2ff'; g.lineWidth=1.6;
      g.beginPath(); g.moveTo(cx,cy-7); g.lineTo(cx,cy-7-jh); g.stroke();
      g.lineWidth=1; g.globalAlpha=0.4; g.beginPath(); g.moveTo(cx,cy-7); g.lineTo(cx,cy-7-jh*0.7); g.stroke();
      for(let i=0;i<11;i++){ const t=((anim/32)+i*0.091)%1, ang=-Math.PI/2+(i-5)*0.155, sp=7.5;   // fan of droplets arcing up & out, gravity-fall
        const fx=cx+Math.cos(ang)*sp*t*1.35, fy=(cy-7-jh)+Math.sin(ang)*sp*t+t*t*10.5;

/* ---- little ground birds: peck, hop a tile or two, and startle away when you get close ---- */
const BIRD_KINDS=[{c:'#9a6a3e',l:'#b6824c',d:'#74502c'},{c:'#8a8d96',l:'#a8abb4',d:'#6c6f78'},{c:'#5d6a7a',l:'#7a8696',d:'#47525f'}];
function spawnBird(id,hx,hy){
  const k=BIRD_KINDS[(hx+hy)%BIRD_KINDS.length];
  const b=placeEntity(newEntity({id,kind:'obj',tx:hx,ty:hy,dir:'down',solid:false,visible:true,
    col:k.c,colL:k.l,colD:k.d, hx,hy, bx:hx*TS+8, by:hy*TS+12, lift:0, st:'peck', t:400+Math.random()*1400, hp:0, fromx:0,fromy:0,tox:0,toy:0, face:Math.random()<0.5?1:-1, fast:false }));
  function hopTo(tx,ty){ b.st='hop'; b.hp=0; b.fromx=b.bx; b.fromy=b.by; b.tox=tx*TS+8+(Math.random()*6-3); b.toy=ty*TS+12+(Math.random()*3-1.5); b.face=(b.tox>=b.bx)?1:-1; }
  b.tick=(e,dt)=>{
    if(game.state!=='play' && game.state!=='cutscene') return;
    const p=game.player;
    if(p && e.st!=='hop'){ const d=Math.abs(p.px-e.bx)+Math.abs(p.py-e.by); if(d<24){   // startle: dash a couple tiles away from the player
      const ax=clamp(e.hx+(e.bx<p.px?-2:2), e.hx-2, e.hx+2), ay=clamp(e.hy+(e.by<p.py?-1:1), e.hy-2, e.hy+2); e.fast=true; hopTo(ax,ay); } }
    if(e.st==='hop'){
      e.hp += dt/(e.fast?190:300);
      e.lift = Math.sin(clamp(e.hp,0,1)*Math.PI)*(e.fast?7:5);
      if(e.hp>=1){ e.hp=1; e.lift=0; e.bx=e.tox; e.by=e.toy; e.st='peck'; e.t=500+Math.random()*1500; e.fast=false; }
      else { e.bx=lerp(e.fromx,e.tox,e.hp); e.by=lerp(e.fromy,e.toy,e.hp); }
    } else { e.t-=dt; if(e.t<=0){ const nx=clamp(e.hx+((Math.random()*5-2)|0), e.hx-2, e.hx+2), ny=clamp(e.hy+((Math.random()*3-1)|0), e.hy-2, e.hy+2); hopTo(nx,ny); } }
    e.px=e.bx-8; e.py=e.by;   // px centres the sprite at bx; py = ground depth (unlifted) so sorting stays correct
  };
  b.draw=(x,y)=>{
    const cx=x+8, by2=y-b.lift, f=b.face;
    const sh=clamp(1-b.lift/6,0.35,1); ellipse(cx,y+4,3.2*sh,1.2*sh,C.shadow);                    // ground shadow shrinks as it lifts
    if(b.lift<0.6){ g.strokeStyle=b.colD; g.lineWidth=0.7; g.beginPath(); g.moveTo(cx-0.8,by2+2.1); g.lineTo(cx-1.1,by2+4); g.moveTo(cx+0.8,by2+2.1); g.lineTo(cx+1.1,by2+4); g.stroke(); }   // legs
    poly([[cx-f*3.0,by2-1.4],[cx-f*3.0,by2+1.4],[cx-f*5.0,by2-0.2]], b.colD);                      // tail
    ellipse(cx,by2,3.1,2.4,b.col); ellipse(cx,by2-0.7,2.5,1.5,b.colL);                             // body + sunlit back
    const wf = b.st==='hop'? Math.abs(Math.sin(b.hp*Math.PI*6)) : 0.15;
    ellipse(cx-f*0.6,by2+0.3,2.1,1.3-wf*0.9,b.colD);                                               // folded/flapping wing
    const dip=(b.st!=='hop')?Math.max(0,Math.sin(anim/5))*1.5:0, hX=cx+f*2.5, hY=by2-1.5+dip;       // head dips while pecking
    circle(hX,hY,1.6,b.col); circle(hX-f*0.3,hY-0.6,1.0,b.colL);
    poly([[hX+f*1.1,hY-0.2],[hX+f*3.0,hY+0.3],[hX+f*1.1,hY+0.9]],'#e8a43a');                         // beak
    circle(hX+f*0.5,hY-0.3,0.46,'#1a1420'); circle(hX+f*0.66,hY-0.46,0.18,'#fff'); };               // eye
  return b;
}

/* ---- two kids kick a soccer ball back and forth in the lower plaza (pure ambience) ---- */
function spawnSoccer(){
  const ay=24, ax=19, bx=27;
  const kidA=npc('soc1','kid',ax,ay,'right',[{name:'Kid',text:'Wanna kickabout? Heads up - I bend it like nobody else!'}]);
  const kidB=npc('soc2','gal',bx,ay,'left', [{name:'Kid',text:'We play out here every spring. Go on, give it a boot!'}]);
  const x0=ax*TS+10, x1=bx*TS-10, depthY=ay*TS;     // ball rests just in front of each kid's kicking foot
  const ball=placeEntity(newEntity({id:'soccerball',kind:'obj',tx:ax,ty:ay,dir:'down',solid:false,visible:true,bp:0.5,bd:1,rest:0}));
  ball.tick=(e,dt)=>{
    if(game.state!=='play' && game.state!=='cutscene') return;
    if(e.rest>0){ e.rest-=dt; }                     // brief pause at each kid so the kick can land
    else { e.bp += e.bd*dt*0.00055;                 // gentle roll (~2s each way)
      if(e.bp>=1){ e.bp=1; e.bd=-1; e.rest=220; }
      if(e.bp<=0){ e.bp=0; e.bd=1;  e.rest=220; } }
    kidA.dir='right'; kidB.dir='left';
    kidA.kick = clamp((0.16-e.bp)/0.16, 0, 1);      // kidA's foot swings out as the ball nears the left end
    kidB.kick = clamp((e.bp-0.84)/0.16, 0, 1);      // kidB's foot swings out as the ball nears the right end
    e.px=lerp(x0,x1,e.bp); e.py=depthY;
  };
  ball.draw=(x,y)=>{
    const cx=x+8, hop=Math.abs(Math.sin(ball.bp*Math.PI*2))*2.4, by=y+12-hop;   // two gentle bounces per crossing
    const roll=ball.bp*Math.PI*7*(ball.bd<0?-1:1);
    ellipse(cx,y+13.8,3.6*(1-hop*0.05),1.4,C.shadow);
    circle(cx,by,3.4,'#d7d9de');                                              // sphere base
    circle(cx-0.9,by-0.9,2.5,'#ffffff');                                      // sunlit side
    g.globalAlpha=0.22; circle(cx+1.2,by+1.3,2.4,'#5f6670'); g.globalAlpha=1; // shaded side
    const pent=(px,py,s,rot)=>{ g.fillStyle='#20242c'; g.beginPath(); for(let i=0;i<5;i++){ const a=rot+i*1.2566, X=px+Math.cos(a)*s, Y=py+Math.sin(a)*s; i?g.lineTo(X,Y):g.moveTo(X,Y); } g.closePath(); g.fill(); };
    pent(cx,by,1.05, roll*0.4);                                              // central black pentagon
    for(let i=0;i<3;i++){ const a=roll+i*2.094; if(Math.cos(a)>-0.15) pent(cx+Math.cos(a)*2.1, by+Math.sin(a)*1.9, 0.62, a); }   // patches rolling around the surface
    g.globalAlpha=0.85; circle(cx-1.3,by-1.4,0.7,'#fff'); g.globalAlpha=1;    // specular highlight
  };
}

/* =========================================================================
   YAMPER CATCH - Mezastar-style ball spinner. One throw per encounter:
   time SPACE to land the spinner on the best ball (Poke 10 / Great 15 /
   Ultra 20). Yamper has 50 pts; reduce to 0 to catch. ->catchFinish(caught)
   ========================================================================= */
const BALL_VAL={poke:10, great:15, ultra:20};
const BALL_TOP={poke:'#e23b3b', great:'#3a78c8', ultra:'#f6c020'};
const BALL_NM ={poke:'POKE BALL', great:'GREAT BALL', ultra:'ULTRA BALL'};
const mez={ active:false, points:50, onResult:null, phase:'spin', t:0, ang:0, ring:[], sel:-1, ball:null, dmg:0 };
function mezSlotAngle(i){ return -Math.PI/2 + i*(Math.PI*2/mez.ring.length); }
function startCatch(points, onResult){
  mez.active=true; mez.points=points; mez.onResult=onResult||null;
  mez.phase='intro'; mez.t=0; mez.ang=Math.random()*Math.PI*2;
  mez.ring=['poke','great','poke','ultra','poke','great','poke','great']; mez.sel=-1; mez.ball=null; mez.dmg=0;
  mez.firstTime=!F.yamperTaught;          // show the how-to only on the first encounter
  mez.prevTrack=audio.track;
  game.state='catch'; clearPressed();
  audio.play('catchgo'); audio.sfx('battlestart');
}
function catchFinish(caught){ mez.active=false; const cb=mez.onResult; mez.onResult=null; game.state='cutscene'; clearPressed();
  audio.play(mez.prevTrack||'route'); if(cb) cb(Math.max(0,mez.points), caught); }
function catchUpdate(dt){
  const pt=mez.t; mez.t+=dt;
  if(mez.phase==='intro'){            // battle-style entrance: "A wild Yamper appeared!"
    if(mez.t>=1700 || (consume('ok')&&mez.t>600)){ mez.phase=mez.firstTime?'howto':'spin'; mez.t=0; clearPressed(); }
    return;
  }
  if(mez.phase==='howto'){            // one-time instructions
    if(consume('ok')&&mez.t>350){ F.yamperTaught=true; mez.firstTime=false; mez.phase='spin'; mez.t=0; }
    return;
  }
  if(mez.phase==='spin'){
    mez.ang=(mez.ang + dt*0.009)%(Math.PI*2);   // the BALLS rotate at half the previous speed - fast but readable; pointer fixed at top
    if(consume('ok')){
      let best=0,bd=99; for(let i=0;i<mez.ring.length;i++){ const raw=(mezSlotAngle(i)+mez.ang)-(-Math.PI/2); const d=Math.abs(Math.atan2(Math.sin(raw),Math.cos(raw))); if(d<bd){bd=d;best=i;} }
      mez.sel=best; mez.ball=mez.ring[best]; mez.ang=-Math.PI/2-mezSlotAngle(best);   // snap chosen ball to the top pointer
      mez.phase='throw'; mez.t=0; audio.sfx(mez.ball==='ultra'?'win':'confirm');
    }
    return;
  }
  if(mez.phase==='throw'){ if(mez.t>=560){ mez.phase='wobble'; mez.t=0; audio.sfx('throw'); } return; }
  if(mez.phase==='wobble'){
    for(const m of [350,780,1180]) if(pt<m && mez.t>=m) audio.sfx('cursor');
    if(mez.t>=1550){ mez.dmg=BALL_VAL[mez.ball]; mez.points=Math.max(0, mez.points-mez.dmg); mez.phase='result'; mez.t=0; audio.sfx(mez.points<=0?'spark':'hit'); }
    return;
  }
  if(mez.phase==='result'){ if(mez.t>=1100){ if(mez.points<=0){ mez.phase='caught'; mez.t=0; audio.sfx('throw'); } else { mez.phase='fled'; mez.t=0; audio.sfx('cancel'); } } return; }
  if(mez.phase==='caught'){   // elaborate capture: ball flies -> Yamper absorbed -> 3 wobbles -> stars
    for(const m of [1700,2150,2600]) if(pt<m && mez.t>=m) audio.sfx('cursor');   // the three wobble clicks
    if(pt<2950 && mez.t>=2950) audio.fanfare();                                   // caught! fanfare on the click-lock
    if(mez.t>=4400 || (consume('ok')&&mez.t>3100)) catchFinish(true);
    return;
  }
  if(mez.phase==='fled'){ if(consume('ok')&&mez.t>400) catchFinish(false); return; }
}
function drawCatchBall(x,y,r,type,lit){
  if(lit){ g.globalAlpha=0.5; circle(x,y,r+3,'#ffe24a'); g.globalAlpha=1; }
  circle(x,y,r,'#f0f0ea');
  g.save(); g.beginPath(); g.arc(x,y,r,Math.PI,0); g.closePath(); g.clip(); circle(x,y,r,BALL_TOP[type]); g.restore();
  rect(x-r,y-0.8,r*2,1.6,'#202028');
  circle(x,y,r*0.36,'#f8f8f0'); circle(x,y,r*0.18,'#9aa0ac');
  if(type==='ultra'){ rect(x-r*0.55,y-r*0.66,r*0.5,1,'#202028'); rect(x+r*0.05,y-r*0.66,r*0.5,1,'#202028'); }
}
function drawCatchBallCovered(x,y,r){   // mystery capsule - you can't tell which ball it is until it nears the pointer
  circle(x,y,r,'#444c60');
  g.save(); g.beginPath(); g.arc(x,y,r,Math.PI,0); g.closePath(); g.clip(); circle(x,y,r,'#5a647c'); g.restore();
  rect(x-r,y-0.8,r*2,1.6,'#1a1e28');
  circle(x,y,r*0.34,'#aeb6c8'); circle(x,y,r*0.16,'#5a647c');
  g.fillStyle='#10131c'; setFont(6); g.textAlign='center'; g.textBaseline='middle'; g.fillText('?', x, y-r*0.5); g.textBaseline='alphabetic';
}
function catchDraw(){
  const grd=g.createLinearGradient(0,0,0,VH); grd.addColorStop(0,'#1e2c46'); grd.addColorStop(1,'#33476a');
  g.fillStyle=grd; g.fillRect(0,0,VW,VH);
  for(let i=0;i<5;i++){ if((Math.floor(anim/8)+i)%5!==0) continue; const px=(i*61+Math.floor(anim/8)*17)%VW, py=20+(i*11)%56;
    g.strokeStyle='rgba(159,208,240,.5)'; g.lineWidth=0.8; g.beginPath(); g.moveTo(px,py); g.lineTo(px+3,py-3); g.lineTo(px+1,py-1); g.lineTo(px+4,py-5); g.stroke(); }
  g.textAlign='center';
  const yx=VW/2, yy=58;
  // ---- battle-style entrance ----
  if(mez.phase==='intro'){
    const p=clamp(mez.t/520,0,1), yIn=yx+(1-p)*90, hop=Math.abs(Math.sin(mez.t/120))*4;
    ellipse(yIn,yy+20,18,4,'rgba(0,0,0,.25)'); drawMon('yamper', yIn, yy-hop, 17);
    if(mez.t<200){ g.globalAlpha=(1-mez.t/200)*0.6; g.fillStyle='#fff'; g.fillRect(0,0,VW,VH); g.globalAlpha=1; }
    textShadow('A wild YAMPER appeared!', VW/2, 110, '#ffe24a','#2a2a08',11);
    if(mez.t>1000 && Math.floor(anim/30)%2) text('press SPACE', VW/2, 150, '#9aa', 8);
    g.textAlign='left'; return;
  }
  // ---- one-time how-to ----
  if(mez.phase==='howto'){
    drawMon('yamper', yx, 40, 15);
    uiBox(14, 64, VW-28, 96);
    g.textAlign='center'; textShadow('HOW TO CATCH', VW/2, 78, '#ffe24a','#2a2a08',9);
    g.textAlign='left'; g.textBaseline='top';
    const lines=['The balls spin around the ring fast.','Press SPACE to STOP the spin.','You grab the ball under the ▼ arrow!','Better balls knock off more HP -','the gold ULTRA ball is best.'];
    for(let i=0;i<lines.length;i++) text(lines[i], 22, 91+i*13, '#25324a', 8);   // dark text on the white box so it's easy to read
    g.textBaseline='alphabetic'; g.textAlign='center';
    if(Math.floor(anim/30)%2) textShadow('press SPACE to begin', VW/2, 170, '#f6b81e','#3a2400', 8);
    g.textAlign='left'; return;
  }
  // ---- gameplay ----
  textShadow('CATCH  YAMPER!', VW/2, 12, '#ffe24a','#2a2a08',10);
  const cx=VW/2, cy=140, RR=30, ptrTop=cy-RR*0.9;
  const capturing = (mez.phase==='caught');
  // Yamper (skip while being captured - drawn in the capture block instead)
  if(!capturing){
    let wob=0, flash=0;
    if(mez.phase==='wobble') wob=Math.sin(mez.t/45)*2.4*(1-mez.t/1550);
    if(mez.phase==='result' && mez.t<200) flash=1-mez.t/200;
    ellipse(yx,yy+20,18,4,'rgba(0,0,0,.25)'); drawMon('yamper', yx+wob, yy, 17);
    if(flash>0){ g.globalAlpha=flash*0.7; circle(yx,yy,20,'#fff'); g.globalAlpha=1; }
  }
  // HP bar (hidden during the capture animation so the ball doesn't overlap it)
  if(!capturing){ const bw=120, bx=VW/2-bw/2, by=84;
    rrect(bx-2,by-2,bw+4,9,3,'rgba(10,14,24,.7)');
    const frac=clamp(mez.points/50,0,1);
    g.fillStyle = frac>0.5?'#46e05a':frac>0.25?'#f6d62e':'#e23b3b'; rpath(bx,by,Math.max(0,bw*frac),5,2); g.fill();
    text('HP  '+Math.max(0,mez.points)+' / 50', VW/2, by+18, '#dfe7ff', 8); }
  if(!capturing){
    // ring of balls ROTATING past a fixed top pointer.
    // which slot is currently under the pointer?
    let topIdx=0, bd=99;
    for(let i=0;i<mez.ring.length;i++){ const a=mezSlotAngle(i)+mez.ang; const d=Math.abs(Math.atan2(Math.sin(a+Math.PI/2),Math.cos(a+Math.PI/2))); if(d<bd){ bd=d; topIdx=i; } }
    const N=mez.ring.length, reveal=new Set([(topIdx-1+N)%N, topIdx, (topIdx+1)%N]);   // only the ball at the ▼ and its two neighbours are face-up
    for(let i=0;i<mez.ring.length;i++){ const a=mezSlotAngle(i)+mez.ang, px=cx+Math.cos(a)*RR, py=cy+Math.sin(a)*RR*0.9;
      const shown = (mez.phase!=='spin') || reveal.has(i);   // once a throw is locked in, flip everything face-up
      if(shown) drawCatchBall(px,py,5, mez.ring[i], (mez.phase==='spin'&&i===topIdx) || (mez.phase!=='spin'&&i===mez.sel));
      else drawCatchBallCovered(px,py,5); }
    // fixed pointer at the top, pointing down at the ball under it
    g.save(); g.translate(cx, ptrTop-10); poly([[-4,0],[4,0],[0,7]],'#ffe24a'); g.restore();
    if(mez.phase==='throw'){ const p=clamp(mez.t/560,0,1), fx=lerp(cx,yx,p), fy=lerp(ptrTop,yy,p)-Math.sin(p*Math.PI)*28; drawCatchBall(fx,fy,5,mez.ball,false); }
  }
  // ---- messages / capture animation ----
  if(mez.phase==='spin'){ if(Math.floor(anim/26)%2) textShadow('Press SPACE to STOP the spin and grab a ball!', VW/2, 172, '#fff','#0a1830', 8); }
  else if(mez.phase==='throw'||mez.phase==='wobble'){ text(BALL_NM[mez.ball]+'!', VW/2, 172, mez.ball==='ultra'?'#ffe24a':'#dfe7ff', 8);
    if(mez.ball==='ultra' && mez.phase==='throw') textShadow('PERFECT!', VW/2, 156, '#ffe24a','#a06000',10); }
  else if(mez.phase==='result'){ textShadow('-'+mez.dmg+'!', yx, 40, '#ff8a6a','#400',12); }
  else if(mez.phase==='caught'){
    const t=mez.t; let bX=yx, bY=yy, showYam=true, yamS=1, beam=0;
    if(t<450){ const p=t/450; bY=lerp(VH-24, yy, p)-Math.sin(p*Math.PI)*26; }       // ball flies up to Yamper
    else if(t<900){ const p=(t-450)/450; bY=yy; yamS=1-p; beam=Math.sin(p*Math.PI); } // Yamper absorbed (shrinks, red beam)
    else { showYam=false; const p=Math.min(1,(t-900)/600); bY=lerp(yy, yy+34, p); }  // ball drops to rest
    let tilt=0; if(t>1550 && t<2900){ const w=(t-1550)/450; tilt=Math.sin(w*Math.PI*2)*0.45*(1-(t-1550)/1350); }   // 3 wobbles, decaying
    if(showYam && yamS>0.06){ g.save(); g.translate(yx,yy); g.scale(yamS,yamS); drawMon('yamper',0,0,17); g.restore(); }
    if(beam>0){ g.globalAlpha=beam*0.7; g.strokeStyle='#ff6a6a'; g.lineWidth=2; g.beginPath(); g.moveTo(bX,bY); g.lineTo(yx,yy); g.stroke(); g.globalAlpha=1; }
    ellipse(bX,yy+50,8,2,'rgba(0,0,0,.25)');
    g.save(); g.translate(bX, bY); g.rotate(tilt); drawCatchBall(0,0,8,'poke',false); g.restore();
    if(t>2950){ for(let i=0;i<12;i++){ const a=anim*0.06+i*0.52, rr=20+Math.sin(anim/10+i)*5; drawStar(bX+Math.cos(a)*rr, bY+Math.sin(a)*rr, 2.2, '#ffe24a'); }
      textShadow('Gotcha!  Yamper was caught!', VW/2, 172, '#9affc0','#06301a',9);
      if(Math.floor(anim/30)%2) text('press SPACE', VW/2, 186, '#9aa', 7); }
  }
  else if(mez.phase==='fled'){ text('Yamper wriggled free and dashed off!', VW/2, 172, '#ffd0a0', 8);
    if(Math.floor(anim/30)%2) text('press SPACE', VW/2, 186, '#9aa', 7); }
  g.textAlign='left';
}

/* ================= STATION (Jolteon) ================= */
function setupStation(){
  audio.play('station');
  if(!F.sawStation){ F.sawStation=true; showEstablishing('station','OLD POWER STATION'); }
  // Jolteon in a live electric cage near top centre
  const jolt=mon('joltC','jolteon',6,2,6); jolt.solid=true;
  // throw the master breaker -> the cage dies -> the Rocket Engineer storms in -> free Jolteon
  function freeJolteon(){
    F.stationSolved=true;
    runSeq([
      {type:'sfx',name:'spark'},{type:'flash',col:C.yellow,ms:220},{type:'shake',ms:320},
      {type:'say',name:'',text:'Oen slots the MASTER BREAKER home and hauls the switch down. The electric cage dies with a heavy CLUNK!'},
      {type:'func',fn:()=>{ F.engineerHere=true; }},
      {type:'spawn',entity:{id:'eng',kind:'char',sub:'grunt',tx:8,ty:4,dir:'down'}},
      {type:'say',name:'Rocket Engineer',text:'Hey! Who cut my power?! Team Rocket doesn\'t forgive unpaid electricians.'},
      {type:'say',name:'Rocket Engineer',text:'Let\'s see if you can handle a little shock!'},
      {type:'battle',cfg:{trainer:'Rocket Engineer', kind:'grunt', taunts:['My machines run on raw voltage - feel it!','You can\'t pull the plug on me, kid!','Voltorb, shock him senseless!'], enemies:[{species:'magnemite'},{species:'voltorb'}]}},
      {type:'levelup',to:12},
      {type:'say',name:'Rocket Engineer',text:'No! With the breaker down, the whole cage is overloading!'},
      {type:'flash',col:C.yellow,ms:300},{type:'shake',ms:300},{type:'sfx',name:'spark'},
      {type:'despawn',id:'eng'},
      {type:'func',fn:()=>{ F.jolteonFree=true; }},
      {type:'video',key:'jolteon'},
      {type:'spark',id:'joltC',col:C.yellow},
      {type:'approach',id:'joltC'},
      {type:'say',name:'Jolteon',text:'Jolteon! (It shakes off the sparks and runs to Oen.)'},
      {type:'hearts',id:'player'},
      {type:'say',name:'Prof. Oak',text:'Great job, Oen! Jolteon is safe. I\'m sending it back to the lab now.'},
      {type:'flash',col:'#fff',ms:400},{type:'func',fn:()=>audio.fanfare()},
      {type:'despawn',id:'joltC'},
      {type:'flag',set:'jolteonRescued'},
      {type:'say',name:'Evo Tracker',text:'Jolteon returned to the lab. Fire energy detected in town - head to the Ember Warehouse (south-west).'},
      {type:'say',name:'Prof. Oak',text:'Now make your way back outside, Oen. Leave through the door to the south.'},
      {type:'objective',text:'Leave the Power Station - walk out through the door (south).'},
    ], ()=>{ game.state='play'; });
  }
  // the cage CONTROL PANEL (master-breaker slot), centre of the room in front of Jolteon
  placeEntity(newEntity({id:'breaker',kind:'obj',tx:6,ty:4,dir:'down',solid:true,visible:true,
    draw:(x,y)=>{ ellipse(x+8,y+15,5,1.6,C.shadow);
      rect(x+1,y+3,14,12,'#444b5c'); rect(x+1,y+3,14,2,'#5a6276'); rect(x+1,y+14,14,1,'#2a2d38');
      const dead=F.stationSolved, armed=F.gotBreaker && !dead;
      rrect(x+3,y+5,8,4,1,'#1a1d26');
      rect(x+4,y+6,2,2, dead?'#46e05a':(armed?'#f6d62e':'#7a2a2a')); rect(x+8,y+6,2,2, dead?'#46e05a':'#3a3f4a');
      g.strokeStyle='#9aa0ac'; g.lineWidth=1.4; g.beginPath(); g.moveTo(x+8,y+12.5); g.lineTo(x+8+(dead?3:-3),y+9.5); g.stroke(); circle(x+8+(dead?3:-3),y+9.5,1.4,'#e23b3b');
      if(armed && Math.floor(anim/14)%2){ circle(x+8,y+3,3,'rgba(246,214,46,.4)'); } } ,
    talk:(e)=>{
      if(F.stationSolved){ runSeq([{type:'say',name:'',text:'The breaker is thrown and the cage is dead. Jolteon is free.'}],()=>game.state='play'); return; }
      if(!F.gotBreaker){
        if(!F.needBreaker){ F.needBreaker=true;
          runSeq([
            {type:'say',name:'',text:'Oen studies the control panel. A heavy slot in the centre is stamped "MASTER BREAKER" - but it sits empty. The cage won\'t cut without it.'},
            {type:'say',name:'',text:'A faded sticker on the casing reads: "Master breaker checked out by the old KEEPER. - see his house, west side of town."'},
            {type:'say',name:'Oen',text:'So that\'s it... I need the Keeper\'s breaker. One of the houses on the west side. I\'ll go find him.'},
            {type:'objective',text:'Find the KEEPER\'S HOUSE on the WEST side of town and get the master breaker.'},
          ],()=>game.state='play');
        } else {
          runSeq([{type:'say',name:'Oen',text:'Still no master breaker. The Keeper\'s house is on the west side of town - I should go.'}],()=>game.state='play');
        }
        return;
      }
      freeJolteon();
    }}));
  // entry dialog once - no hand-holding from Oak; Oen works it out by inspecting the panel herself
  if(!F.stationIntro){ F.stationIntro=true;
    runSeq([
      {type:'say',name:'',text:'The Old Power Station hums with trapped electricity. At the far end, Jolteon is caged in a crackling field.'},
      {type:'say',name:'Oen',text:'That big CONTROL PANEL in the middle of the room must run the cage. Let me take a closer look.'},
      {type:'objective',text:'Inspect the cage CONTROL PANEL in the middle of the room.'},
    ],()=>{ game.state='play'; });
  } else if(!F.jolteonRescued){
    game.objective = F.gotBreaker ? 'Use the MASTER BREAKER on the cage CONTROL PANEL (centre of the room).'
      : F.needBreaker ? 'Find the KEEPER\'S HOUSE on the WEST side of town and get the master breaker.'
      : 'Inspect the cage CONTROL PANEL in the middle of the room.';
  }
}

/* ================= WAREHOUSE (Flareon) ================= */

  audio.play('warehouse');

      {type:'despawn',id:'cole'},

      {type:'say',name:'Flareon',text:'Fla... flare. (It presses its warm head gently against Oen.)'},

    draw:(x,y)=>{ ellipse(x+8,y+15,7,2,C.shadow);
